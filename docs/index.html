function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function chatAnswer(qRaw, ctx) {
  const q = qRaw.toLowerCase();
  const has = (...ws) => ws.some(w => q.includes(w));
  const holdings = (ctx && ctx.holdings) || [];
  const priced = holdings.filter(h => h.priced);

  // help
  if (has("aiuto", "help", "cosa posso", "che domande", "come funzioni", "cosa sai"))
    return "Puoi chiedermi, ad esempio:\n• Come va il mio portafoglio?\n• Quanto posso perdere in una giornata nera? (VaR)\n• Come posso diversificare?\n• Qual è il titolo migliore / peggiore?\n• Cosa muove i miei titoli?\n• Che notizie ci sono per me oggi?\n• Com'è la volatilità (VIX)? E i tassi?\n• Sono troppo concentrato?\n• Cos'è il MOVE / DXY / R² / VIF?";

  // glossary / definitions
  if (has("cos'è", "cosa è", "cos e", "che cos", "significa", "spiega", "vuol dire")) {
    for (const [k, v] of Object.entries(CHAT_GLOSSARY)) if (q.includes(k)) return v;
  }

  // portfolio performance
  if (has("come va", "come sta", "performance", "andamento", "guadagn", "perdit", "sta andando", "quanto rendo", "quanto ho fatto")) {
    if (!priced.length) return "Non hai ancora posizioni con un prezzo valido. Aggiungi un titolo nella tab \"Il tuo portafoglio\".";
    const inv = priced.reduce((s, h) => s + h.invested, 0);
    const val = priced.reduce((s, h) => s + h.marketValue, 0);
    const pnl = (val - inv) / inv * 100;
    const lines = priced.map(h => `• ${h.name}: ${h.pnl >= 0 ? "+" : ""}${h.pnl.toFixed(0)}%`).join("\n");
    return `Il tuo portafoglio è a <strong>${pnl >= 0 ? "+" : ""}${pnl.toFixed(1)}%</strong> (${Math.round(inv).toLocaleString("it-IT")}€ → ${Math.round(val).toLocaleString("it-IT")}€ oggi).\nPer titolo:\n${lines}`;
  }

  // best / worst
  if (has("migliore", "meglio", "top", "che rende di più", "va meglio") && priced.length) {
    const b = priced.slice().sort((a, c) => c.pnl - a.pnl)[0];
    return `Il titolo che rende di più è <strong>${b.name}</strong>: ${b.pnl >= 0 ? "+" : ""}${b.pnl.toFixed(0)}%.`;
  }
  if (has("peggiore", "peggio", "va peggio", "rende di meno") && priced.length) {
    const w = priced.slice().sort((a, c) => a.pnl - c.pnl)[0];
    return `Il titolo che rende di meno è <strong>${w.name}</strong>: ${w.pnl >= 0 ? "+" : ""}${w.pnl.toFixed(0)}%.`;
  }

  // news / press review
  if (has("notiz", "news", "articol", "novità", "rassegna", "giornal", "successo oggi", "succede oggi")) {
    const items = (newsData && newsData.items) || [];
    if (!items.length) return "Le notizie non sono ancora state caricate — apri prima la tab \"Il tuo portafoglio\" e riprova.";
    const picks = newsTopPicks(items, (typeof portfolioState !== "undefined" && portfolioState.holdings) || []);
    return "Le 3 notizie più rilevanti per te adesso:\n" + picks.map(({ item, mine }) =>
      `• <a href="${item.url.replace(/"/g, "&quot;")}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a> <em>(${item.source}, ${newsAgo(item.published)}${mine.length ? " — riguarda i tuoi titoli" : ""})</em>`
    ).join("\n");
  }

  // technical / trend (RSI, momentum, ipercomprato…). "rsi" needs a word
  // boundary: it's a substring of "diveRSIficare" and would hijack the
  // diversification question below.
  if (/\brsi\b/.test(q) || has("trend", "ipercompr", "ipervend", "momentum", "tecnic", "in salita", "in discesa", "surriscald")) {
    const techs = (ctx && ctx.technicals) || [];
    const avail = techs.filter(t => t.tech);
    if (!avail.length) return "Aggiungi un titolo con abbastanza storico per vedere gli indicatori tecnici.";
    return avail.map(e => "• " + technicalNarrative(e.tech, e.name)).join("\n");
  }

  // VaR / tail risk ("var" with word boundary: it's a substring of
  // "variazione"/"varie")
  if (/\bvar\b/.test(q) || has("value at risk", "perdita massima", "quanto posso perdere", "giornata nera", "giorno nero", "scenario peggiore")) {
    const v = ctx && ctx.quant && ctx.quant.varres;
    if (!v) return "Serve un portafoglio con almeno ~100 giorni di storico per calcolare il Value at Risk.";
    return varNarrative(v);
  }

  // GARCH / volatility regime
  if (has("garch", "volatilità futura", "regime di volatil", "cluster")) {
    const g = ctx && ctx.quant && ctx.quant.garch;
    if (!g) return "Serve un portafoglio con almeno ~150 giorni di storico per stimare il GARCH.";
    return garchNarrative(g);
  }

  // diversification ideas
  if (has("diversific", "ribilanci", "riadatt", "spunti", "come miglioro il portafoglio")) {
    const ins = (ctx && ctx.divInsights) || [];
    if (!ins.length) return "Apri la tab \"Analisi & Previsione\" con almeno un titolo prezzato per generare le osservazioni di diversificazione.";
    return ins.map(b => "• " + b.text).join("\n") + "\n<em>(osservazioni sui tuoi dati, non consigli di investimento)</em>";
  }

  // efficiency / Sharpe
  if (has("sharpe", "efficien", "rischio/rendimento", "rendimento corretto")) {
    const m = ctx && ctx.quant && ctx.quant.met;
    if (!m) return "Serve un portafoglio con storico sufficiente per le metriche di efficienza.";
    return `Il tuo portafoglio rende <strong>${m.annRet.toFixed(1)}%</strong> annuo con una volatilità del ${m.annVol.toFixed(0)}%: Sharpe ratio <strong>${m.sharpe.toFixed(2)}</strong> (${m.sharpe >= 1 ? "buono: il rendimento ripaga bene il rischio" : m.sharpe >= 0.5 ? "discreto" : "basso: molto rischio per il rendimento ottenuto"}). Peggior calo dal massimo: ${m.maxDD.toFixed(0)}%.`;
  }

  // factor sensitivity
  if (has("cosa muove", "muove", "sensibil", "fattori", "dipende", "correla", "reagisce", "influenza")) {
    const pos = (ctx && ctx.factorsPos) || [], neg = (ctx && ctx.factorsNeg) || [];
    if (!pos.length && !neg.length) return "Sui dati storici il tuo portafoglio non ha una relazione statisticamente affidabile con i fattori macro tracciati: si muove soprattutto per ragioni proprie.";
    let r = "Storicamente il tuo portafoglio ";
    if (pos.length) r += `si muove insieme a <strong>${pos.join(", ")}</strong>`;
    if (pos.length && neg.length) r += "; ";
    if (neg.length) r += `soffre quando salgono <strong>${neg.join(", ")}</strong>`;
    return r + ". (relazione storica, non una previsione)";
  }

  // volatility / VIX
  if (has("vix", "volatil", "paura", "clima")) {
    const lvl = parseFloat(findSignalReading(ctx && ctx.card, "macro", "VIX") || "");
    const tr = findSignalReading(ctx && ctx.card, "outlook", "VIX") || "";
    if (isNaN(lvl)) return CHAT_GLOSSARY.vix;
    const mood = lvl <= 16 ? "basso, clima calmo e propenso al rischio" : lvl <= 24 ? "nella media" : "alto, clima teso";
    const dir = /rising/.test(tr) ? ", ed è salito nell'ultimo mese" : /falling/.test(tr) ? ", ed è sceso nell'ultimo mese" : "";
    return `Il VIX è a <strong>${lvl.toFixed(1)}</strong>: ${mood}${dir}.\n${CHAT_GLOSSARY.vix}`;
  }

  // rates
  if (has("tassi", "treasury", "10 anni", "rendimento del", "10y")) {
    const y = parseFloat((findSignalReading(ctx && ctx.card, "macro", "US 10Y") || "").replace("%", ""));
    const tr = findSignalReading(ctx && ctx.card, "outlook", "US 10Y") || "";
    if (isNaN(y)) return CHAT_GLOSSARY["us 10y"];
    const dir = /rising/.test(tr) ? "in salita" : /falling/.test(tr) ? "in calo" : "stabile";
    return `Il rendimento USA a 10 anni è al <strong>${y.toFixed(1)}%</strong> ed è ${dir}.\n${CHAT_GLOSSARY["us 10y"]}`;
  }

  // concentration
  if (has("concentr", "diversific", "troppo su", "peso")) {
    const pv = parseFloat(portfolioState.portfolioValue);
    if (!priced.length) return "Aggiungi almeno una posizione per valutare la concentrazione.";
    if (!(pv > 0)) return "Per la concentrazione, inserisci il \"Valore totale del portafoglio\" nella tab \"Il tuo portafoglio\".";
    const lines = priced.map(h => `• ${h.name}: ${(h.marketValue / pv * 100).toFixed(0)}%`).join("\n");
    const maxc = Math.max(...priced.map(h => h.marketValue / pv * 100));
    const verdict = maxc >= 30 ? "Una posizione supera il 30% del portafoglio: c'è rischio di concentrazione."
      : maxc <= 10 ? "Nessuna posizione domina: buona diversificazione (o posizioni ancora piccole)."
      : "Le posizioni hanno un peso moderato.";
    return `Peso di ogni posizione sul portafoglio dichiarato:\n${lines}\n${verdict}`;
  }

  // holding-specific
  if (priced.length) {
    const hit = priced.find(h => q.includes(h.name.toLowerCase().split(" ")[0]) || q.includes(h.symbol.toLowerCase()));
    if (hit) {
      let r = `${hit.name}: <strong>${hit.pnl >= 0 ? "+" : ""}${hit.pnl.toFixed(0)}%</strong> dalla data d'acquisto.`;
      const reg = (ctx.regressionByAsset || []).find(x => x.label === hit.name);
      if (reg && reg.result && !reg.result.error) r += "\n" + regressionNarrative(reg.result, hit.name);
      return r;
    }
  }

  return "Non sono sicuro di aver capito 🤔. Prova con: \"come va il mio portafoglio?\", \"cosa muove i miei titoli?\", \"com'è il VIX?\", \"cos'è il MOVE?\", oppure scrivi \"aiuto\".";
}

// The Chat section: LLM-style layout — session list on the left ("+
// Nuova chat", history, delete), conversation thread on the right. The
// engine is rule-based (chatAnswer); the UI and storage are already
// generative-ready.
function renderChatTab() {
  loadChatSessions();
  const container = document.getElementById("chat-content");
  container.innerHTML = "";

  const shell = document.createElement("div");
  shell.className = "chat-shell";
  shell.innerHTML = `
    <div class="chat-side" id="chat-side"></div>
    <div class="chat-main">
      <div class="chart-card">
        <h2>💬 Assistente</h2>
        <div class="private-note" style="margin-bottom:0">Risposte basate sui numeri del tuo portafoglio e sui modelli della piattaforma. Motore a regole (l'AI generativa arriverà) — a scopo informativo, non è consulenza.</div>
        <div class="chat-suggestions" id="chat-sugg"></div>
        <div class="chat-thread" id="chat-thread"></div>
        <div class="chat-input-row">
          <input id="chat-input" type="text" autocomplete="off" placeholder="Scrivi una domanda…">
          <button type="button" id="chat-send">Invia</button>
        </div>
      </div>
    </div>`;
  container.appendChild(shell);

  const side = shell.querySelector("#chat-side");
  const thread = shell.querySelector("#chat-thread");
  const input = shell.querySelector("#chat-input");
  const suggEl = shell.querySelector("#chat-sugg");
  const suggestions = ["Come va il mio portafoglio?", "Quanto posso perdere in una giornata nera?", "Come posso diversificare?", "Che notizie ci sono per me?", "Com'è il trend dei miei titoli?", "Sono troppo concentrato?"];

  function paintSide() {
    side.innerHTML = `<button type="button" class="cs-new" id="cs-new">＋ Nuova chat</button>` +
      chatSessions.map(s => `
        <button type="button" class="cs-item ${s.id === chatCurrentId ? "active" : ""}" data-id="${s.id}">
          <span class="cs-title">${escapeHtml(s.title)}</span>
          <span class="cs-del" data-del="${s.id}" title="Elimina conversazione">✕</span>
        </button>`).join("");
    side.querySelector("#cs-new").addEventListener("click", () => {
      newChatSession(); paintSide(); paintThread(); input.focus();
    });
    side.querySelectorAll(".cs-item").forEach(b => b.addEventListener("click", (ev) => {
      const del = ev.target.getAttribute("data-del");
      if (del) {
        chatSessions = chatSessions.filter(s => s.id !== del);
        if (chatCurrentId === del) chatCurrentId = chatSessions.length ? chatSessions[0].id : null;
        saveChatSessions(); paintSide(); paintThread();
        return;
      }
      chatCurrentId = b.dataset.id; paintSide(); paintThread();
    }));
  }

  function paintThread() {
    const s = currentChatSession();
    const msgs = s ? s.messages : [];
    const welcome = `<div class="chat-msg bot">Ciao! 👋 Sono l'assistente della piattaforma: posso leggerti il portafoglio, i modelli di rischio e le notizie. Prova una delle domande qui sopra, o scrivimi.</div>`;
    thread.innerHTML = msgs.length ? msgs.map(m => `<div class="chat-msg ${m.role}">${m.text}</div>`).join("") : welcome;
    thread.scrollTop = thread.scrollHeight;
    suggEl.innerHTML = msgs.length ? "" : suggestions.map(t => `<button type="button" class="chat-chip">${t}</button>`).join("");
    suggEl.querySelectorAll(".chat-chip").forEach(c => c.addEventListener("click", () => send(c.textContent)));
  }

  function send(text) {
    text = (text || "").trim();
    if (!text) return;
    let s = currentChatSession();
    if (!s) s = newChatSession();
    if (!s.messages.length) s.title = text.length > 42 ? text.slice(0, 42) + "…" : text;
    s.messages.push({ role: "user", text: escapeHtml(text) });
    s.messages.push({ role: "bot", text: chatAnswer(text, chatContext) });
    s.ts = Date.now();
    saveChatSessions();
    paintSide(); paintThread();
    input.value = "";
    input.focus();
  }
  shell.querySelector("#chat-send").addEventListener("click", () => send(input.value));
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(input.value); });

  paintSide(); paintThread();
}

// Header for one of the model sections in the Analysis tab. scoreText
// (optional) renders as a small chip on the right, e.g. "Score 62/100".
function buildSectionHeader(num, title, subtitle, scoreText) {

    <span class="as-text"><h1>${title}</h1><div class="as-sub">${subtitle}</div><hr class="as-rule"></span>
    ${scoreText ? `<span class="as-score">${scoreText}</span>` : ""}`;

// ── quant model cards (models computed in quant.js) ──

// Top summary: every model's score in one honest table + the two
// headline axes the user asked the models to answer: how EFFICIENT the
// portfolio performs, and how much RISK it is running.
function buildQuantScorecard(q) {
  const el = document.createElement("div");
  el.className = "chart-card";
  const effScore = scoreEfficiency(q.met);
  const riskScore = scoreOverallRisk(scoreGarchRisk(q.garch), scoreVarRisk(q.varres), scoreDiversification(q.div));
  if (effScore == null && riskScore == null) {
    el.innerHTML = `<h2>🎯 Quant scorecard</h2><div class="private-note">Aggiungi almeno un titolo prezzato con abbastanza storico per calcolare i punteggi dei modelli.</div>`;
    return el;
  }
  const rows = [
    q.met && { m: "Efficienza (Sharpe)", s: effScore, hi: "più alto = meglio", read: `Sharpe ${q.met.sharpe.toFixed(2)} — rendimento ${q.met.annRet.toFixed(1)}%/anno per ${q.met.annVol.toFixed(0)}% di volatilità` },
    q.garch && { m: "GARCH — rischio volatilità", s: scoreGarchRisk(q.garch), hi: "più alto = più rischio", read: `vol condizionata ${q.garch.condVolAnn.toFixed(0)}% annua (media ${q.garch.uncondVolAnn.toFixed(0)}%)` },
    q.varres && { m: "VaR — rischio di coda", s: scoreVarRisk(q.varres), hi: "più alto = più rischio", read: `perdita 1-su-100 in un giorno: ${q.varres.hist.var99.toFixed(1)}%` },
    q.tsPort && { m: "TSMOM — trend", s: scoreTrend(q.tsPort), hi: "50 = laterale", read: `trend ${q.tsPort.label}` },
    q.div && { m: "Diversificazione", s: scoreDiversification(q.div), hi: "più alto = meglio", read: `${q.div.effN ? q.div.effN.toFixed(1) : "—"} titoli "effettivi"${q.div.avgCorr != null ? `, correlazione media ${q.div.avgCorr.toFixed(2)}` : ""}` },
  ].filter(Boolean).map(r => `<tr><td class="factor-name">${r.m}</td><td class="num"><strong>${r.s}</strong>/100</td><td style="font-size:11px;color:var(--muted)">${r.hi}</td><td style="font-size:12px">${r.read}</td></tr>`).join("");

  const detail = q.met ? `
    <details class="reg-details">
      <summary>Mostra le metriche di efficienza (dettaglio tecnico)</summary>
      <div class="reg-table-wrap"><table class="reg-table">
        <thead><tr><th>Metrica</th><th>Valore</th><th>Cosa dice</th></tr></thead>
        <tbody>
          <tr><td class="factor-name">Rendimento annualizzato (CAGR)</td><td class="num">${q.met.annRet.toFixed(1)}%</td><td style="font-size:12px">crescita composta media annua</td></tr>
          <tr><td class="factor-name">Volatilità annualizzata</td><td class="num">${q.met.annVol.toFixed(1)}%</td><td style="font-size:12px">ampiezza tipica delle oscillazioni</td></tr>
          <tr><td class="factor-name">Sharpe ratio</td><td class="num">${q.met.sharpe.toFixed(2)}</td><td style="font-size:12px">extra-rendimento per unità di rischio (>1 buono, >2 raro)</td></tr>
          <tr><td class="factor-name">Sortino ratio</td><td class="num">${q.met.sortino != null ? q.met.sortino.toFixed(2) : "—"}</td><td style="font-size:12px">come Sharpe ma penalizza solo la volatilità al ribasso</td></tr>
          <tr><td class="factor-name">Max drawdown</td><td class="num">${q.met.maxDD.toFixed(1)}%</td><td style="font-size:12px">peggior calo dal massimo nel periodo</td></tr>
          <tr><td class="factor-name">Calmar ratio</td><td class="num">${q.met.calmar != null ? q.met.calmar.toFixed(2) : "—"}</td><td style="font-size:12px">rendimento annuo / peggior calo</td></tr>
        </tbody>
      </table></div>
    </details>` : "";

  el.innerHTML = `
    <h2>🎯 Quant scorecard — efficienza e rischio in un colpo d'occhio</h2>
    <div class="private-note">Ogni modello qui sotto risponde a una delle due domande chiave: <em>quanto rende bene per il rischio che corre?</em> e <em>quanto rischio sta correndo?</em> I punteggi sono letture descrittive dei dati, non segnali operativi.</div>
    <div class="qs-headline">
      ${effScore != null ? `<div class="qs-box"><div class="qs-label">EFFICIENZA</div><div class="qs-value">${effScore}<span style="font-size:14px;color:var(--muted)">/100</span></div><div class="qs-bar"><div style="width:${effScore}%"></div></div><div class="qs-note">quanto il rendimento ripaga il rischio (da Sharpe)</div></div>` : ""}
      ${riskScore != null ? `<div class="qs-box"><div class="qs-label">RISCHIO</div><div class="qs-value">${riskScore}<span style="font-size:14px;color:var(--muted)">/100</span></div><div class="qs-bar risk"><div style="width:${riskScore}%"></div></div><div class="qs-note">volatilità + code + concentrazione (GARCH, VaR, HHI)</div></div>` : ""}
    </div>
    <div class="reg-table-wrap"><table class="reg-table">
      <thead><tr><th>Modello</th><th>Score</th><th>Direzione</th><th>Lettura</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    ${detail}`;
  return el;
}

function buildGarchCard(g) {
  const el = document.createElement("div");
  el.className = "chart-card";
  if (!g) {
    el.innerHTML = `<h2>Volatilità condizionata (GARCH 1,1)</h2><div class="private-note">Servono almeno ~150 giorni di storico del portafoglio per stimare il modello.</div>`;
    return el;
  }
  el.innerHTML = `
    <h2>Volatilità condizionata (GARCH 1,1)</h2>
    <div class="private-note" style="font-weight:600;color:var(--ink)">${garchNarrative(g)}</div>
    <div class="private-note">La volatilità non è costante: si muove a <em>cluster</em> (giornate agitate seguono giornate agitate). Il GARCH stima la volatilità "di oggi" dandole memoria: α pesa lo shock di ieri, β la volatilità di ieri.</div>
    <details class="reg-details">
      <summary>Mostra i parametri (dettaglio tecnico)</summary>
      <div class="reg-table-wrap"><table class="reg-table">
        <thead><tr><th>Parametro</th><th>Valore</th><th>Significato</th></tr></thead>
        <tbody>
          <tr><td class="factor-name">α (reattività agli shock)</td><td class="num">${g.alpha.toFixed(3)}</td><td style="font-size:12px">quanto uno scossone di ieri alza la volatilità di oggi</td></tr>
          <tr><td class="factor-name">β (memoria)</td><td class="num">${g.beta.toFixed(3)}</td><td style="font-size:12px">quanto la volatilità di ieri persiste oggi</td></tr>
          <tr><td class="factor-name">α + β (persistenza)</td><td class="num">${g.persistence.toFixed(3)}</td><td style="font-size:12px">vicino a 1 = i regimi di volatilità durano a lungo</td></tr>
          <tr><td class="factor-name">Vol. incondizionata</td><td class="num">${g.uncondVolAnn.toFixed(1)}%</td><td style="font-size:12px">volatilità media di lungo periodo (annualizzata)</td></tr>
          <tr><td class="factor-name">Vol. condizionata (oggi)</td><td class="num">${g.condVolAnn.toFixed(1)}%</td><td style="font-size:12px">volatilità stimata per domani, dato il presente</td></tr>
          <tr><td class="factor-name">Previsione media 10 giorni</td><td class="num">${g.forecast10dVolAnn.toFixed(1)}%</td><td style="font-size:12px">il modello riporta gradualmente la vol verso la media</td></tr>
        </tbody>
      </table></div>
      <div class="private-note" style="margin-top:10px">Stima: GARCH(1,1) gaussiano con variance targeting, massima verosimiglianza su griglia (riproducibile — stessi numeri nell'Excel di verifica). n=${g.n} rendimenti giornalieri.</div>
    </details>`;
  return el;
}

function buildVarCard(v) {
  const el = document.createElement("div");
  el.className = "chart-card";
  if (!v) {
    el.innerHTML = `<h2>Value at Risk (VaR)</h2><div class="private-note">Servono almeno ~100 giorni di storico del portafoglio per un VaR sensato.</div>`;
    return el;
  }
  const eur = (x) => x != null ? `€${Math.round(x).toLocaleString("it-IT")}` : "—";
  const pct = (x) => x != null ? x.toFixed(2) + "%" : "—";
  el.innerHTML = `
    <h2>Value at Risk (VaR) — quanto puoi perdere nei giorni peggiori</h2>
    <div class="private-note" style="font-weight:600;color:var(--ink)">${varNarrative(v)}</div>
    <div class="private-note">Tre metodi indipendenti, come nei fondi: se convergono, la stima è solida; se divergono, la distribuzione ha code più pesanti di una normale.</div>
    <div class="reg-table-wrap"><table class="reg-table">
      <thead><tr><th>Metodo</th><th>VaR 95%</th><th>VaR 99%</th><th>Orizzonte</th></tr></thead>
      <tbody>
        <tr><td class="factor-name">Simulazione storica</td><td class="num">${pct(v.hist.var95)}</td><td class="num">${pct(v.hist.var99)}</td><td style="font-size:12px">1 giorno</td></tr>
        <tr><td class="factor-name">Varianza-covarianza (normale)</td><td class="num">${pct(v.param.var95)}</td><td class="num">${pct(v.param.var99)}</td><td style="font-size:12px">1 giorno</td></tr>
        ${v.paramGarch ? `<tr><td class="factor-name">Parametrico con vol GARCH</td><td class="num">${pct(v.paramGarch.var95)}</td><td class="num">${pct(v.paramGarch.var99)}</td><td style="font-size:12px">1 giorno</td></tr>` : ""}
        <tr><td class="factor-name">Monte Carlo (bootstrap, ${v.mc10d.nSims.toLocaleString("it-IT")} scenari)</td><td class="num">${pct(v.mc10d.var95)}</td><td class="num">${pct(v.mc10d.var99)}</td><td style="font-size:12px">10 giorni</td></tr>
      </tbody>
    </table></div>
    ${v.value ? `<div class="private-note" style="margin-top:8px">Sul valore attuale del portafoglio (≈ ${eur(v.value)}): VaR 99% 1g ≈ <strong>${eur(v.eur99)}</strong>, Expected Shortfall 95% ≈ <strong>${eur(v.eurEs95)}</strong> (perdita media nel 5% peggiore), Monte Carlo 99% a 10 giorni ≈ <strong>${eur(v.eur99mc10d)}</strong>.</div>` : ""}
    <details class="reg-details">
      <summary>Come leggere questi numeri</summary>
      <div class="private-note" style="margin-top:10px">
        VaR 99% a 1 giorno = la perdita che statisticamente viene superata solo 1 giornata su 100. L'<em>Expected Shortfall</em> risponde alla domanda successiva: "e quando va peggio di così, quanto perdo in media?". Il Monte Carlo qui non assume la distribuzione normale: ricampiona ${v.n} rendimenti reali del tuo portafoglio (bootstrap) su orizzonti di 10 giorni, seme fisso per riproducibilità. Nessuno di questi è un limite garantito: il futuro può superare il passato.
      </div>
    </details>`;
  return el;
}

function buildTsmomCard(tsmomByAsset, tsPort) {
  const el = document.createElement("div");
  el.className = "chart-card";
  const avail = tsmomByAsset.filter(e => e.t);
  if (!avail.length && !tsPort) {
    el.innerHTML = `<h2>Time-Series Momentum (TSMOM)</h2><div class="private-note">Servono almeno ~130 giorni di storico per stimare i trend multi-orizzonte.</div>`;
    return el;
  }
  const bullets = [];
  if (tsPort) bullets.push(tsmomNarrative(tsPort, "Portafoglio (aggregato)"));
  for (const e of avail) bullets.push(tsmomNarrative(e.t, e.name));

  const rows = (tsPort ? [{ name: "Portafoglio", t: tsPort }] : []).concat(avail.map(e => ({ name: e.name, t: e.t }))).map(({ name, t }) => {
    const cells = [21, 63, 126, 252].map(h => {
      const s = t.signals.find(x => x.h === h);
      return `<td class="num">${s ? `${s.ret >= 0 ? "+" : ""}${s.ret.toFixed(0)}% ${s.sign > 0 ? "▲" : s.sign < 0 ? "▼" : "•"}` : "—"}</td>`;
    }).join("");
    return `<tr><td class="factor-name">${name}</td>${cells}<td class="num">${t.emaSign > 0 ? "▲ sopra" : t.emaSign < 0 ? "▼ sotto" : "—"}</td><td class="num"><strong>${t.score >= 0 ? "+" : ""}${t.score.toFixed(2)}</strong></td></tr>`;
  }).join("");

  el.innerHTML = `
    <h2>Time-Series Momentum (TSMOM) — il trend continuerà?</h2>
    ${bullets.map(b => `<div class="private-note" style="font-weight:600;color:var(--ink)">${b}</div>`).join("")}
    <div class="private-note">Il TSMOM guarda il segno del rendimento passato su più orizzonti (1/3/6/12 mesi) più l'incrocio delle medie mobili esponenziali EMA(20)/EMA(100): storicamente i trend tendono a persistere più di quanto il caso giustifichi — ma non sempre, e le inversioni sono brusche.</div>
    <details class="reg-details">
      <summary>Mostra i segnali per orizzonte (dettaglio tecnico)</summary>
      <div class="reg-table-wrap"><table class="reg-table">
        <thead><tr><th>Serie</th><th>1 mese</th><th>3 mesi</th><th>6 mesi</th><th>12 mesi</th><th>EMA 20/100</th><th>Score</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div class="private-note" style="margin-top:10px">Score = media dei segni (da −1 = tutto in ribasso a +1 = tutto in rialzo). ▲/▼ = rendimento positivo/negativo su quell'orizzonte.</div>
    </details>`;
  return el;
}

function buildDiversificationCard(insights, div) {
  const el = document.createElement("div");
  el.className = "interp-card";
  const weightsLine = (div && div.weights.length > 1)
    ? `<div class="ic-sub">Pesi attuali: ${div.weights.map(w => `${w.name} ${(w.weight * 100).toFixed(0)}%`).join(" · ")}${div.effN ? ` — ≈ ${div.effN.toFixed(1)} titoli "effettivi" (HHI ${div.hhi.toFixed(2)})` : ""}.</div>`
    : `<div class="ic-sub">Osservazioni costruite sui numeri dei modelli qui sopra e sul contesto macro/news.</div>`;
  el.innerHTML = `
    <h2>Spunti di diversificazione — cosa noterebbe un analista</h2>
    ${weightsLine}
    <ul class="interp-bullets">
      ${insights.map(b => `<li><span class="ib-icon">${b.icon}</span><span class="ib-text">${b.text}</span></li>`).join("")}
    </ul>
    <div class="interp-close">Queste sono osservazioni educative derivate dai tuoi dati — non raccomandazioni di acquisto o vendita. Ogni scelta va valutata rispetto ai tuoi obiettivi, orizzonte e situazione personale (il tuo profilo: usa il bottone "⚙ Profilo" per tenerlo aggiornato).</div>`;
  return el;
}

// ═══ The discursive "advisor" layer: the models translated into plain
// prose for a non-technical reader, calibrated on the risk profile.
// Informational only — it rephrases what the models measured, adds no
// recommendation, and says so explicitly. Returns {full, compact} HTML
// or null when there's not enough data to say anything honest.
function buildAdvisorNarrative(ctx) {
  const { holdings, quant, profile } = ctx;
  const priced = (holdings || []).filter(h => h.priced);
  if (!priced.length || !quant || !quant.met) return null;
  const m = quant.met, g = quant.garch, v = quant.varres, t = quant.tsPort, d = quant.div;
  const eur = (x) => "€" + Math.round(x).toLocaleString("it-IT");
  const totMV = priced.reduce((s, h) => s + h.marketValue, 0);
  const totInv = priced.reduce((s, h) => s + h.invested, 0);
  const totPnl = (totMV / totInv - 1) * 100;
  const best = priced.slice().sort((a, b) => b.pnl - a.pnl)[0];
  const worst = priced.slice().sort((a, b) => a.pnl - b.pnl)[0];
  const label = profile ? profile.label : null;

  const paras = [];

  // 1 — where you stand
  let p1 = `Oggi il tuo portafoglio vale circa <strong>${eur(totMV)}</strong>: rispetto ai ${eur(totInv)} investiti sei ${totPnl >= 0 ? "in guadagno" : "in perdita"} del <strong>${totPnl >= 0 ? "+" : ""}${totPnl.toFixed(1)}%</strong>.`;
  if (priced.length > 1 && best !== worst) {
    p1 += ` A trainare è stato ${best.name} (${best.pnl >= 0 ? "+" : ""}${best.pnl.toFixed(0)}%), mentre ${worst.name} ${worst.pnl >= 0 ? `è cresciuto meno (+${worst.pnl.toFixed(0)}%)` : `è in rosso (${worst.pnl.toFixed(0)}%)`}.`;
  }
  paras.push(p1);

  // 2 — return vs the risk paid for it
  let sharpeWord = m.sharpe >= 1.5 ? "molto bene" : m.sharpe >= 1 ? "bene" : m.sharpe >= 0.5 ? "in modo accettabile" : "poco";
  paras.push(`Il rendimento è stato del <strong>${m.annRet.toFixed(1)}% annuo</strong>, ottenuto però accettando oscillazioni ampie (volatilità ${m.annVol.toFixed(0)}% annua). In rapporto al rischio corso, il portafoglio ha reso <strong>${sharpeWord}</strong> (Sharpe ${m.sharpe.toFixed(2)}). Un dato da non dimenticare: nel momento peggiore di questo percorso avresti visto il valore scendere del <strong>${Math.abs(m.maxDD).toFixed(0)}%</strong> dal massimo — chi conosce questo numero in anticipo regge meglio le tempeste.`);

  // 3 — risk right now, in euros
  if (g && v) {
    const regime = g.regimeRatio > 1.25 ? "più agitato del suo solito" : g.regimeRatio < 0.8 ? "più calmo del suo solito" : "nella sua normalità";
    paras.push(`Quanto al rischio di <em>adesso</em>: il mercato del tuo portafoglio è in un periodo <strong>${regime}</strong> (i modelli di volatilità stimano ${g.condVolAnn.toFixed(0)}% contro una media storica del ${g.uncondVolAnn.toFixed(0)}%). In una giornata davvero negativa — ne capita statisticamente una su cento — la perdita storica è arrivata a <strong>${v.hist.var99.toFixed(1)}%</strong>, cioè circa <strong>${eur(totMV * v.hist.var99 / 100)}</strong> sul valore attuale. Non è un limite garantito: è la fotografia di quanto è successo finora.`);
  }

  // 4 — trend + structure
  const bits = [];
  if (t) {
    bits.push(t.score >= 0.6 ? `il vento dei prezzi è a favore (trend ${t.label} su quasi tutti gli orizzonti)` :
              t.score <= -0.6 ? `il vento dei prezzi è contrario (trend ${t.label})` :
              `il trend dei prezzi è ${t.label}`);
  }
  if (d && d.effN != null) {
    bits.push(d.hhi >= 0.5 ? `la struttura è molto concentrata: in pratica stai guidando con ≈ ${d.effN.toFixed(1)} titoli "effettivi", quindi le sorti dipendono da pochissimi nomi` :
              d.hhi >= 0.3 ? `la diversificazione è parziale (≈ ${d.effN.toFixed(1)} titoli "effettivi")` :
              `la diversificazione è ragionevole (≈ ${d.effN.toFixed(1)} titoli "effettivi")`);
  }
  if (bits.length) paras.push(`Guardando avanti: ${bits.join("; ")}. Nella sezione <strong>7 · Diversificazione</strong> trovi le osservazioni puntuali, numeri alla mano.`);

  // 5 — profile-aware closing
  if (label === "Conservativo") {
    paras.push(`Dal tuo profilo (<strong>Conservativo</strong>) questo portafoglio chiede più tolleranza alle oscillazioni di quella che hai dichiarato: i numeri di rischio qui sopra sono la misura concreta di quel divario. Vale la pena rileggerli con calma${d && d.hhi >= 0.5 ? ", specie il punto sulla concentrazione" : ""}.`);
  } else if (label === "Dinamico") {
    paras.push(`Il tuo profilo (<strong>Dinamico</strong>) è coerente con un portafoglio che oscilla: la domanda giusta non è "quanto può salire" ma "reggo il ${Math.abs(m.maxDD).toFixed(0)}% di calo visto in passato senza vendere nel momento peggiore?". Se la risposta è sì, i numeri sopra descrivono un rischio che ti sei scelto consapevolmente.`);
  } else if (label) {
    paras.push(`Rispetto al tuo profilo (<strong>Moderato</strong>), tieni d'occhio l'equilibrio tra la crescita ottenuta e le oscillazioni accettate: i numeri qui sopra ti dicono esattamente dove sta oggi quell'equilibrio.`);
  }

  const disclaimer = `Questa lettura riformula in parole i risultati dei modelli qui sotto — è informazione, non un consiglio: non conosco la tua situazione fiscale, le tue scadenze né i tuoi obiettivi, e non sostituisce un consulente abilitato.`;

  const full = `
    <h2>🧭 In parole semplici — la lettura del tuo portafoglio</h2>
    <div class="adv-sub">Generata dai modelli della piattaforma${label ? `, calibrata sul tuo profilo <strong>${label}</strong>` : ""}.</div>
    ${paras.map(p => `<p>${p}</p>`).join("")}
    <div class="adv-disclaimer">${disclaimer}</div>`;

  const compact = `
    <h2>🧭 In breve</h2>
    <div class="adv-sub"></div>
    <p>${p1} ${g && v ? `In una giornata davvero negativa (1 su 100) la perdita storica arriva a circa <strong>${eur(totMV * v.hist.var99 / 100)}</strong>.` : ""} La lettura completa è nella sezione <strong>Analisi</strong>.</p>
    <div class="adv-disclaimer">Informazione basata sui tuoi dati, non consulenza personalizzata.</div>`;

  return { full, compact };
}

// Card for Section 4 ("News rilevanti") of the Analysis tab: broader than
// the portfolio-tab "Top 3", ranked by sector exposure (derived from the
// held tickers) and by the user's investor profile.
function buildRelevantNewsCard(picks, profile) {
  const el = document.createElement("div");
  el.className = "news-card";
  if (!picks.length) {
    el.innerHTML = `<h2>📰 News rilevanti</h2><div class="private-note">Nessuna notizia recente incrocia il tuo portafoglio o il tuo profilo — riprova più tardi.</div>`;
    return el;
  }
  const rows = picks.map(({ item, mine, matchedTopics }) => {
    const tags = [
      ...(mine.length ? [`<span class="news-tag">riguarda i tuoi titoli</span>`] : []),
      ...matchedTopics.slice(0, 2).map(t => `<span class="news-tag topic">${NEWS_TOPIC_LABELS[t] || t}</span>`),
    ].join("");
    return `<div class="news-item">
      <a href="${item.url.replace(/"/g, "&quot;")}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a>
      <div class="news-meta"><span>${item.source} · ${newsAgo(item.published)}</span>${tags}</div>
    </div>`;
  }).join("");
  el.innerHTML = `
    <h2>📰 News rilevanti</h2>
    <div class="news-sub">Selezionate incrociando i settori del tuo portafoglio${profile ? ` e il tuo profilo (<strong>${profile.label}</strong>)` : ""}. Stesse fonti della tab Portafoglio, selezione più ampia. Articoli in inglese.</div>
    ${rows}
  `;
  return el;
}

let analysisMacroHistory = null;
let analysisFFFactors = null;

async function renderAnalysisTab(card) {
  latestCard = card;
  const el = document.getElementById("analysis-content");
  el.innerHTML = `<div class="chart-card"><div id="private-placeholder">Preparazione analisi…</div></div>`;

  if (!analysisMacroHistory) {
    analysisMacroHistory = await fetchJSON("data/macro_history.json");
  }
  if (!analysisFFFactors) {
    analysisFFFactors = await fetchJSON("data/ff_factors.json");
  }

  // resolve the user's selected portfolio assets (from the browser) into
  // {key, label, history} for the chart + per-asset regressions
  const picked = [];
  for (const h of portfolioState.holdings) {
    const hist = await getTickerHistory(h.symbol);
    if (hist && hist.length) picked.push({ key: h.symbol, label: h.name, history: hist });
  }

  el.innerHTML = "";

  // ── chart ──
  const chartCard = document.createElement("div");
  chartCard.className = "chart-card";
  chartCard.innerHTML = `<h2>Andamento e proiezione</h2>
    <div class="private-note" style="margin-bottom:0">Tutte le serie sono indicizzate a 100 all'inizio del periodo, per essere confrontabili nonostante unità diverse (€, punti indice, %, $).${picked.length ? " Le linee asset sono i titoli del tuo portafoglio." : ""}</div>
    <div id="chart-container"></div>`;
  el.appendChild(chartCard);
  initChartSection(chartCard.querySelector("#chart-container"), {
    navHistory: "data/nav_history.json",
    macroHistory: "data/macro_history.json",
    extraSeries: picked,
  });

  // ── compute a regression per selected asset (in the browser) ──
  const regressionResults = [];
  if (picked.length && analysisMacroHistory) {
    for (const asset of picked) {
      regressionResults.push({ label: asset.label, result: runAssetRegression(asset.history, analysisMacroHistory) });
    }
  }

  // ── refresh the chat context from the same computed data ──
  const chatHoldings = portfolioState.holdings.map(h => {
    const hist = tickerHistoryCache[h.symbol] || [];
    const pp = navOnOrBefore(hist, h.purchaseDate);
    const cp = hist.length ? hist[hist.length - 1][1] : null;
    const isPriced = pp > 0 && cp > 0;
    return {
      name: h.name, symbol: h.symbol, invested: h.investedAmount, priced: isPriced,
      pnl: isPriced ? (cp / pp - 1) * 100 : null,
      marketValue: isPriced ? h.investedAmount * cp / pp : null,
    };
  });
  const cPos = new Set(), cNeg = new Set();
  for (const r of regressionResults) {
    if (!r.result || r.result.error) continue;
    for (const [k, v] of Object.entries(r.result.factors)) {
      const reliable = v.pvalue < 0.05 && (v.vif == null || v.vif < 10);
      if (reliable && v.coef > 0) cPos.add(OLS_FACTOR_LABELS[k] || k);
      if (reliable && v.coef < 0) cNeg.add(OLS_FACTOR_LABELS[k] || k);
    }
  }
  // ── technical indicators per held asset ──
  const techByAsset = picked.map(a => ({ name: a.label, tech: computeTechnicals(a.history) }));

  // ── run the quant models (quant.js) on the weighted portfolio ──
  const pricedForFF = chatHoldings.filter(h => h.priced);
  const totalMV = pricedForFF.reduce((s, h) => s + h.marketValue, 0);
  const ffHoldings = (pricedForFF.length && totalMV > 0)
    ? pricedForFF.map(h => ({ name: h.name, weight: h.marketValue / totalMV, history: tickerHistoryCache[h.symbol] || [] }))
    : [];
  const portRet = ffHoldings.length ? buildPortfolioReturns(ffHoldings) : [];
  const retVals = portRet.map(r => r[1]);
  const ffRes = (portRet.length && analysisFFFactors && analysisFFFactors.length)
    ? runCarhartRegression(portRet, analysisFFFactors) : null;
  // average daily risk-free over the sample (Ken French RF), for Sharpe
  let rfDaily = 0;
  if (analysisFFFactors && portRet.length) {
    const rfMap = new Map(analysisFFFactors.map(r => [r[0], r[5]]));
    const rfs = portRet.map(([d]) => rfMap.get(d)).filter(x => x != null);
    if (rfs.length) rfDaily = rfs.reduce((s, x) => s + x, 0) / rfs.length;
  }
  const met = retVals.length ? perfMetrics(retVals, rfDaily) : null;
  const garch = retVals.length ? garchFit(retVals) : null;
  const varres = retVals.length ? varAnalysis(retVals, garch ? garch.condVolDaily : null, totalMV || null) : null;
  const tsmomByAsset = picked.map(a => ({ name: a.label, t: tsmom(a.history.map(h => h[1]).filter(v => v > 0)) }));
  let tsPort = null;
  if (retVals.length >= 130) {
    const idx = []; let w = 100;
    for (const r of retVals) { w *= 1 + r / 100; idx.push(w); }
    tsPort = tsmom(idx);
  }
  const divStats = ffHoldings.length ? diversificationStats(ffHoldings) : null;
  const quant = { met, garch, varres, tsPort, tsmomByAsset, div: divStats };

  chatContext = { card, holdings: chatHoldings, factorsPos: [...cPos], factorsNeg: [...cNeg], regressionByAsset: regressionResults, technicals: techByAsset, quant };

  // ── the discursive advisor layer: models → plain prose (full version
  // at the top of Analysis, compact echo on Home) ──
  const advisor = buildAdvisorNarrative({ holdings: chatHoldings, quant, profile: userProfile });
  if (advisor) {
    const advCard = document.createElement("div");
    advCard.className = "advisor-card";
    advCard.innerHTML = advisor.full;
    el.appendChild(advCard);
    const homeSlot = document.getElementById("pf-advisor");
    if (homeSlot) homeSlot.innerHTML = `<div class="advisor-card">${advisor.compact}</div>`;
  }

  // ── plain-language interpretation, prominent, right after the chart:
  // a cross-cutting executive summary before the detailed sections ──
  if (regressionResults.length || card.pillars.some(p => p.key === "macro")) {
    const interp = buildInterpretationCard(card, regressionResults);
    if (interp) el.appendChild(interp);
  }

  // ── quant scorecard: every model's score, efficiency vs risk ──
  el.appendChild(buildQuantScorecard(quant));

  // ═══ SECTION 1 — Regressione OLS: sensibilità di ogni titolo ai fattori macro ═══
  el.appendChild(buildSectionHeader(1, "Regressione OLS", "Quanto ogni titolo si è storicamente mosso insieme a tassi, VIX, oro, petrolio e dollaro."));
  if (regressionResults.length) {
    const intro = document.createElement("div");
    intro.className = "private-note";
    intro.style.margin = "4px 0 12px";
    intro.innerHTML = `Una regressione OLS per ciascun titolo del tuo portafoglio: quanto impatto ha storicamente ogni fattore macro sul suo rendimento giornaliero. Calcolata nel tuo browser, aggiornata quando cambi il portafoglio.`;
    el.appendChild(intro);

    for (const { label, result } of regressionResults) {
      if (result.error) {
        const c = document.createElement("div");
        c.className = "chart-card";
        c.innerHTML = `<h2>${label}</h2><div class="private-note">${result.error}</div>`;
        el.appendChild(c);
        continue;
      }
      const narrative = regressionNarrative(result, label);
      const subtitle = `Regressione OLS sui rendimenti giornalieri — R²=${result.r2.toFixed(2)} (adj. ${result.adjR2.toFixed(2)}), n=${result.n}. R² modesto è normale: i mercati non sono spiegati bene da un modello lineare.`;
      el.appendChild(regressionTableCard(`${label} — analisi fattoriale`, narrative, subtitle, result.factors));
    }
  } else {
    const c = document.createElement("div");
    c.className = "chart-card";
    c.innerHTML = `<div class="private-note">Aggiungi almeno un titolo al tuo portafoglio nella tab "Il tuo portafoglio" per vedere qui la regressione OLS dedicata per ciascun asset.</div>`;
    el.appendChild(c);
  }

  // ═══ SECTION 2 — Fama-French-Carhart: il portafoglio contro i 4 fattori di stile accademici ═══
  el.appendChild(buildSectionHeader(2, "Fama-French-Carhart", "Il portafoglio nel suo complesso, letto con i fattori di stile che il mondo accademico usa per spiegare i rendimenti azionari."));
  if (ffRes) {
    el.appendChild(buildCarhartCard(ffRes));
  } else {
    const c = document.createElement("div");
    c.className = "chart-card";
    c.innerHTML = `<div class="private-note">Aggiungi almeno un titolo prezzato al tuo portafoglio per vedere qui la decomposizione Fama-French-Carhart.</div>`;
    el.appendChild(c);
  }

  // ═══ SECTION 3 — Indicatori tecnici: trend e rischio letti dal grafico prezzi ═══
  el.appendChild(buildSectionHeader(3, "Indicatori tecnici", "Il comportamento recente dei prezzi di ogni titolo: forza del trend, volatilità e rischio di movimenti estremi."));
  const techCard = buildTechnicalCard(techByAsset);
  if (techCard) {
    el.appendChild(techCard);
  } else {
    const c = document.createElement("div");
    c.className = "chart-card";
    c.innerHTML = `<div class="private-note">Aggiungi almeno un titolo con abbastanza storico (40+ giorni) per vedere qui gli indicatori tecnici.</div>`;
    el.appendChild(c);
  }

  // ═══ SECTION 4 — GARCH: la volatilità ha memoria ═══
  el.appendChild(buildSectionHeader(4, "GARCH — volatilità condizionata",
    "La volatilità si muove a cluster: il modello econometrico stima quella di oggi e la proietta sui prossimi giorni.",
    garch ? `Rischio ${scoreGarchRisk(garch)}/100` : null));
  el.appendChild(buildGarchCard(garch));

  // ═══ SECTION 5 — Value at Risk: la perdita nei giorni peggiori ═══
  el.appendChild(buildSectionHeader(5, "Value at Risk (VaR)",
    "Massima perdita potenziale a un dato livello di confidenza — con tre metodi indipendenti: storico, varianza-covarianza e Monte Carlo.",
    varres ? `Rischio ${scoreVarRisk(varres)}/100` : null));
  el.appendChild(buildVarCard(varres));

  // ═══ SECTION 6 — TSMOM: trend following multi-orizzonte ═══
  el.appendChild(buildSectionHeader(6, "Time-Series Momentum (TSMOM)",
    "Il trend passato su più orizzonti (1/3/6/12 mesi) e le medie mobili esponenziali: i trend tendono a persistere.",
    tsPort ? `Trend ${scoreTrend(tsPort)}/100` : null));
  el.appendChild(buildTsmomCard(tsmomByAsset, tsPort));

  // ── shared macro context: current levels + recent trend of the macro
  // factors (from scorecard.json — market data, not personal). The same
  // data Section 1's OLS runs against, and the regime behind Sections
  // 3–5's volatility readings. ──
  const contextPillars = card.pillars.filter(p => p.key === "macro" || p.key === "outlook");
  if (contextPillars.length) {
    const ctxIntro = document.createElement("div");
    ctxIntro.className = "private-note";
    ctxIntro.style.margin = "18px 0 6px";
    ctxIntro.innerHTML = `<strong>Contesto di mercato oggi</strong> — livello attuale e trend recente dei fattori macro. Sono gli stessi dati incrociati nella Sezione 1 (regressione OLS) e collegati al regime di volatilità delle Sezioni 3–5.`;
    el.appendChild(ctxIntro);

    const legend = document.createElement("div");
    legend.className = "legend";
    legend.innerHTML = ["supportive", "caution", "neutral"].map(b =>
      `<span><span class="mark ${b}">${markSymbol[b]}</span>${markLabel[b]}</span>`
    ).join("");
    el.appendChild(legend);

    for (const p of contextPillars) el.appendChild(pillarCard(p));
  }

  // ═══ SECTION 7 — Diversificazione: osservazioni dai numeri ═══
  const [newsForSection] = await Promise.all([loadNews(), loadTickerSectors()]);
  const sectorTopicsForDiv = sectorTopicsFromHoldings(newsForSection.items || [], portfolioState.holdings);
  el.appendChild(buildSectionHeader(7, "Diversificazione",
    "Cosa dicono concentrazione, correlazioni, stili ed esposizioni macro sulla struttura del portafoglio — osservazioni, non consigli.",
    divStats ? `Score ${scoreDiversification(divStats)}/100` : null));
  if (divStats) {
    const insights = buildDiversificationInsights({
      div: divStats, met, garch, varres, carhart: ffRes,
      olsNeg: [...cNeg], tsmomByAsset, sectorTopics: sectorTopicsForDiv,
    });
    chatContext.divInsights = insights;
    el.appendChild(buildDiversificationCard(insights, divStats));
  } else {
    const c = document.createElement("div");
    c.className = "chart-card";
    c.innerHTML = `<div class="private-note">Aggiungi almeno un titolo prezzato per vedere qui le osservazioni di diversificazione.</div>`;
    el.appendChild(c);
  }

  // ═══ SECTION 8 — News rilevanti: settori del portafoglio + profilo utente ═══
  el.appendChild(buildSectionHeader(8, "News rilevanti", "Notizie selezionate incrociando i settori del tuo portafoglio e il tuo profilo da investitore."));
  if (!authConfigured() || userProfile) {
    const picks = newsRelevantForProfile(newsForSection.items || [], portfolioState.holdings, userProfile);
    el.appendChild(buildRelevantNewsCard(picks, userProfile));
  } else {
    const c = document.createElement("div");
    c.className = "chart-card";
    c.innerHTML = `<div class="private-note">Compila il tuo profilo da investitore (bottone "⚙ Profilo" nella tab "Il tuo portafoglio") per vedere qui le notizie più adatte a te.</div>`;
    el.appendChild(c);
  }
}

function switchView(view) {
  document.getElementById("content").style.display = view === "dashboard" ? "block" : "none";
  document.getElementById("analysis-content").style.display = view === "analysis" ? "block" : "none";
  document.getElementById("chat-content").style.display = view === "chat" ? "block" : "none";
  document.getElementById("profile-content").style.display = view === "profile" ? "block" : "none";
  document.querySelectorAll(".sb-item").forEach(b =>
    b.classList.toggle("active", b.dataset.view === view));
  closeSidebar();  // mobile: navigating closes the off-canvas menu
  window.scrollTo({ top: 0 });
}

// ── mobile sidebar (off-canvas) ──
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sb-backdrop").classList.remove("show");
}
document.getElementById("sb-toggle").addEventListener("click", () => {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sb-backdrop").classList.toggle("show");
});
document.getElementById("sb-backdrop").addEventListener("click", closeSidebar);

// Sidebar footer: signed-in user + profile shortcut + logout. Re-rendered
// on every auth/profile change (called from renderGated / render).
function updateSidebarUser() {
  const el = document.getElementById("sb-user");
  if (!el) return;
  if (authConfigured() && currentUser) {
    el.innerHTML = `
      <div class="sb-email">${currentUser.email}</div>
      ${userProfile ? `<div class="sb-profile-line">Profilo: <strong>${userProfile.label}</strong></div>` : ""}
      <button type="button" id="sb-logout">Esci</button>`;
    el.querySelector("#sb-logout").addEventListener("click", async () => { await authSignOut(); });
  } else {
    el.innerHTML = `<div class="sb-profile-line">Non hai effettuato l'accesso.</div>`;
  }
}

async function load() {
  const loading = document.getElementById("loading");
  const err = document.getElementById("error");

  loading.style.display = "block";
  err.style.display = "none";

  try {
    const [cardRes, navHistRes] = await Promise.all([
      fetch("data/scorecard.json", { cache: "no-store" }),
      fetch("data/nav_history.json", { cache: "no-store" }),
      loadTickerList(),  // preload the searchable universe for the portfolio input
    ]);
    if (!cardRes.ok) throw new Error("scorecard.json non trovato nel repo.");
    const card = await cardRes.json();
    navHistory = navHistRes.ok ? await navHistRes.json() : [];
    loading.style.display = "none";
    currentNav = card.meta.nav;
    appCard = card;
    loadNews(); loadTickerSectors();  // fire-and-forget: the news card and the chat both use them

    if (authConfigured()) {
      if (!window.supabase) throw new Error("Impossibile caricare il modulo di login (Supabase SDK).");
      // onAuthStateChange fires INITIAL_SESSION immediately with the
      // restored session (or null) — that drives the first render, and
      // every later sign-in / sign-out re-renders too.
      authOnChange(async (user) => {
        if (!user) userProfile = null;  // reset so the next sign-in (possibly a different account) re-fetches
        currentUser = user;
        await renderGated();
      });
    } else {
      await renderGated();  // localStorage fallback (dev / not configured)
    }
  } catch (e) {
    loading.style.display = "none";
    err.style.display = "block";
    err.textContent = e.message;
  }
}
document.querySelectorAll(".sb-item").forEach(b =>
  b.addEventListener("click", () => switchView(b.dataset.view))
);
load();
