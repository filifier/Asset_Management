<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio BI — Scorecard</title>
<style>
  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --ink: #1f2a24;
    --muted: #6b7a70;
    --border: #e4e0d6;
    --support: #2f7a4f;
    --support-bg: #e8f3ec;
    --caution: #b5502a;
    --caution-bg: #fbeee6;
    --neutral: #8a8478;
    --neutral-bg: #f1efe9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 32px 16px 64px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  header h1 { font-size: 22px; margin: 0 0 4px; }
  header p { margin: 0; color: var(--muted); font-size: 14px; }

  .asset-line {
    display: flex; justify-content: space-between; align-items: baseline;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
  }
  .asset-line .name { font-weight: 600; font-size: 15px; }
  .asset-line .nav { color: var(--muted); font-size: 14px; }

  .pillar {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
  }
  .pillar-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .pillar-head h2 { font-size: 15px; margin: 0; }
  .badge {
    font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px;
  }
  .badge.support { color: var(--support); background: var(--support-bg); }
  .badge.caution { color: var(--caution); background: var(--caution-bg); }
  .badge.neutral { color: var(--neutral); background: var(--neutral-bg); }

  .signal {
    display: flex; gap: 10px; padding: 8px 0;
    border-top: 1px solid var(--border);
  }
  .signal:first-child { border-top: none; }
  .mark {
    flex: 0 0 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; margin-top: 1px;
  }
  .mark.supportive { color: var(--support); background: var(--support-bg); }
  .mark.caution { color: var(--caution); background: var(--caution-bg); }
  .mark.neutral { color: var(--neutral); background: var(--neutral-bg); }
  .signal-body .name { font-weight: 600; font-size: 13.5px; }
  .signal-body .reading { color: var(--muted); font-size: 13px; margin-left: 6px; }
  .signal-body .why { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  .summary {
    background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid var(--neutral);
    border-radius: 12px; padding: 16px 20px; font-size: 13.5px; color: var(--ink);
    line-height: 1.5;
  }
  .summary.support-lean { border-left-color: var(--support); }
  .summary.caution-lean { border-left-color: var(--caution); }

  .disclaimer {
    margin-top: 24px; font-size: 11.5px; color: var(--muted); text-align: center;
  }
  #error {
    display: none; background: var(--caution-bg); color: var(--caution);
    border-radius: 12px; padding: 16px 20px; font-size: 13.5px; line-height: 1.5;
  }
  #error code {
    background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px;
  }
  #loading {
    text-align: center; color: var(--muted); font-size: 13.5px; padding: 40px 0;
  }

  .overview {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 20px;
  }
  .overview-top {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .overview .name { font-weight: 600; font-size: 15px; }
  .overview .nav { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .overview .verdict {
    font-size: 13.5px; margin-top: 10px; color: var(--ink); line-height: 1.4;
  }
  .refresh-row {
    display: flex; align-items: center; gap: 10px; margin-top: 12px;
  }
  .updated-at { font-size: 11.5px; color: var(--muted); }
  #refresh-btn {
    font-size: 12.5px; font-weight: 600; color: var(--ink);
    background: var(--neutral-bg); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 12px; cursor: pointer;
  }
  #refresh-btn:hover { background: var(--border); }
  #refresh-btn:disabled { opacity: 0.6; cursor: default; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--muted);
    margin-bottom: 16px; padding: 0 4px;
  }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend .mark { flex: 0 0 16px; height: 16px; font-size: 10px; margin-top: 0; }

  .private {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
  }
  .private-head h2 { font-size: 15px; margin: 0 0 4px; }
  .private-note {
    font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.4;
  }
  .private-form {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 6px;
  }
  .private-form label {
    display: block; font-size: 11.5px; color: var(--muted); margin-bottom: 4px;
  }
  .private-form input {
    width: 100%; font-size: 13.5px; padding: 7px 9px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  .private-form input:focus { outline: 2px solid var(--support); outline-offset: 1px; }
  .remember-row {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted);
    margin: 10px 0 4px;
  }
  #private-results { margin-top: 12px; }
  #private-results .signal:first-child { border-top: 1px solid var(--border); }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-wrap label {
    display: block; font-size: 11.5px; color: var(--muted); margin-bottom: 4px;
  }
  .search-wrap input {
    width: 100%; font-size: 13.5px; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  .search-wrap input:focus { outline: 2px solid var(--support); outline-offset: 1px; }
  .search-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; z-index: 10;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    max-height: 260px; overflow-y: auto; box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }
  .search-result {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 9px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover { background: var(--neutral-bg); }
  .search-result .sr-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .search-result .sr-meta { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .search-empty { padding: 12px; font-size: 12.5px; color: var(--muted); font-style: italic; }

  .selected-chip {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--support-bg); border: 1px solid var(--support);
    border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 13px;
  }
  .selected-chip .sc-name { font-weight: 600; color: var(--support); }
  .selected-chip .sc-meta { color: var(--muted); font-size: 11.5px; margin-left: 6px; }
  .selected-chip button {
    background: none; border: none; color: var(--muted); font-size: 12px;
    cursor: pointer; font-weight: 600; text-decoration: underline;
  }

  .add-holding-form {
    display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end;
    margin-bottom: 14px;
  }
  .add-holding-form label {
    display: block; font-size: 11.5px; color: var(--muted); margin-bottom: 4px;
  }
  .add-holding-form input {
    width: 100%; font-size: 13.5px; padding: 7px 9px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  #add-holding-btn {
    font-size: 13px; font-weight: 600; color: #fff; background: var(--support);
    border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; white-space: nowrap;
  }
  #add-holding-btn:disabled { opacity: 0.5; cursor: default; }

  .holdings-list { margin-bottom: 14px; }
  .holding-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-top: 1px solid var(--border); gap: 10px;
  }
  .holding-row .hr-name { font-size: 13px; font-weight: 600; }
  .holding-row .hr-meta { font-size: 11.5px; color: var(--muted); }
  .holding-row .hr-pnl { font-size: 13px; font-weight: 700; white-space: nowrap; }
  .holding-row .hr-pnl.positive { color: var(--support); }
  .holding-row .hr-pnl.negative { color: var(--caution); }
  .holding-row .hr-remove {
    background: none; border: none; color: var(--muted); font-size: 16px;
    cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .holding-row .hr-remove:hover { color: var(--caution); }

  /* ── prominent search hero ── */
  .search-hero {
    background: var(--card); border: 1.5px solid var(--support);
    border-radius: 14px; padding: 16px 18px; margin-bottom: 18px;
    box-shadow: 0 2px 10px rgba(47,122,79,0.06);
  }
  .search-hero .sh-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; gap: 10px;
  }
  .search-hero h3 { font-size: 15px; margin: 0; color: var(--ink); }
  #pf-refresh {
    font-size: 12px; font-weight: 600; color: var(--support);
    background: var(--support-bg); border: 1px solid var(--support);
    border-radius: 999px; padding: 5px 12px; cursor: pointer; white-space: nowrap;
  }
  #pf-refresh:hover { background: #dcecdf; }
  #pf-refresh:disabled { opacity: 0.55; cursor: default; }
  .search-box { position: relative; }
  .search-box .s-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; opacity: 0.45; pointer-events: none;
  }
  .search-box input {
    width: 100%; font-size: 15px; padding: 13px 14px 13px 40px;
    border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  .search-box input:focus {
    outline: none; border-color: var(--support);
    box-shadow: 0 0 0 3px rgba(47,122,79,0.15); background: var(--card);
  }

  /* ── portfolio performance summary ── */
  .perf-summary {
    display: flex; justify-content: space-between; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid var(--neutral);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 14px;
  }
  .perf-summary.pos { border-left-color: var(--support); }
  .perf-summary.neg { border-left-color: var(--caution); }
  .perf-summary .perf-label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .perf-summary .perf-value { font-size: 30px; font-weight: 800; line-height: 1.1; margin: 2px 0; }
  .perf-summary .perf-value.pos { color: var(--support); }
  .perf-summary .perf-value.neg { color: var(--caution); }
  .perf-summary .perf-sub { font-size: 12.5px; color: var(--muted); }

  /* ── holding cards (chosen securities + performance) ── */
  .holding-card {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 8px;
  }
  .holding-card .hc-name { font-size: 14px; font-weight: 700; }
  .holding-card .hc-meta { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .holding-card .hc-conc { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .holding-card .hc-right { display: flex; align-items: center; gap: 14px; }
  .holding-card .hc-pnl { font-size: 20px; font-weight: 800; white-space: nowrap; }
  .holding-card .hc-pnl.pos { color: var(--support); }
  .holding-card .hc-pnl.neg { color: var(--caution); }
  .holding-card .hc-pnl.na { color: var(--muted); font-size: 14px; }
  .holding-card .hr-remove {
    background: none; border: none; color: var(--muted); font-size: 18px;
    cursor: pointer; padding: 0 2px; line-height: 1;
  }
  .holding-card .hr-remove:hover { color: var(--caution); }

  #private-placeholder {
    font-size: 12.5px; color: var(--muted); font-style: italic; margin-top: 8px;
  }

  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
  }
  .chart-card h2 { font-size: 15px; margin: 0 0 4px; }
  .chart-controls {
    display: flex; gap: 6px; margin: 10px 0;
  }
  .chart-range-btn {
    font-size: 12px; font-weight: 600; color: var(--muted);
    background: var(--neutral-bg); border: 1px solid var(--border);
    border-radius: 999px; padding: 4px 11px; cursor: pointer;
  }
  .chart-range-btn.active { color: var(--ink); background: var(--border); }
  .chart-range-btn:hover { background: var(--border); }
  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 4px;
  }
  .chart-legend-item {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--muted); cursor: pointer;
  }
  .chart-swatch {
    width: 12px; height: 3px; border-radius: 2px; display: inline-block;
  }
  .chart-svg-holder { margin-top: 10px; }
  .chart-svg-holder svg { width: 100%; height: auto; display: block; }

  .view-tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .view-tab-btn {
    font-size: 13.5px; font-weight: 600; color: var(--muted);
    background: none; border: none; border-bottom: 2px solid transparent;
    padding: 8px 4px; margin-bottom: -1px; cursor: pointer;
  }
  .view-tab-btn.active { color: var(--ink); border-bottom-color: var(--support); }
  .view-tab-btn:hover { color: var(--ink); }

  .reg-table-wrap { overflow-x: auto; margin-top: 10px; }
  .reg-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .reg-table th, .reg-table td {
    text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .reg-table th { color: var(--muted); font-weight: 600; font-size: 11.5px; }
  .reg-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .reg-table tr.sig-pos td.factor-name { color: var(--support); }
  .reg-table tr.sig-neg td.factor-name { color: var(--caution); }
  .reg-badge {
    display: inline-block; font-size: 10.5px; font-weight: 700;
    padding: 1px 6px; border-radius: 999px;
  }
  .reg-badge.yes { color: var(--support); background: var(--support-bg); }
  .reg-badge.no { color: var(--muted); background: var(--neutral-bg); }
  .reg-badge.vif-high { color: var(--caution); background: var(--caution-bg); }

  /* ── plain-language interpretation ── */
  .interp-card {
    background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid var(--support);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
  }
  .interp-card h2 { font-size: 15px; margin: 0 0 4px; }
  .interp-card .ic-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .interp-bullets { list-style: none; margin: 0; padding: 0; }
  .interp-bullets li {
    display: flex; gap: 11px; padding: 9px 0; font-size: 13.5px; line-height: 1.45;
    border-top: 1px solid var(--border); color: var(--ink);
  }
  .interp-bullets li:first-child { border-top: none; }
  .interp-bullets .ib-icon { flex: 0 0 22px; font-size: 16px; line-height: 1.3; }
  .interp-close {
    font-size: 12px; color: var(--muted); margin-top: 10px; font-style: italic;
    border-top: 1px solid var(--border); padding-top: 10px;
  }

  /* ── collapsible technical detail ── */
  .reg-details { margin-top: 6px; }
  .reg-details summary {
    cursor: pointer; font-size: 12px; color: var(--support); font-weight: 600;
    padding: 4px 0; list-style: none; user-select: none;
  }
  .reg-details summary::-webkit-details-marker { display: none; }
  .reg-details summary::before { content: "▸  "; }
  .reg-details[open] summary::before { content: "▾  "; }

  /* ── chat assistant (rule-based, beta) ── */
  .chat-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 10px; }
  .chat-chip {
    font-size: 12px; color: var(--support); background: var(--support-bg);
    border: 1px solid var(--support); border-radius: 999px; padding: 5px 11px; cursor: pointer;
  }
  .chat-chip:hover { background: #dcecdf; }
  .chat-thread {
    display: flex; flex-direction: column; gap: 8px; margin: 4px 0 12px;
    max-height: 320px; overflow-y: auto;
  }
  .chat-thread:empty { display: none; }
  .chat-msg {
    max-width: 88%; padding: 9px 13px; border-radius: 13px; font-size: 13.5px;
    line-height: 1.45; white-space: pre-wrap; word-wrap: break-word;
  }
  .chat-msg.user { align-self: flex-end; background: var(--support); color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.bot { align-self: flex-start; background: var(--neutral-bg); color: var(--ink); border-bottom-left-radius: 4px; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row input {
    flex: 1; font-size: 14px; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 10px; background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  .chat-input-row input:focus { outline: none; border-color: var(--support); box-shadow: 0 0 0 3px rgba(47,122,79,0.15); }
  .chat-input-row button {
    font-size: 14px; font-weight: 700; color: #fff; background: var(--support);
    border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer;
  }

  /* ── login / account ── */
  .auth-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 16px; max-width: 420px;
  }
  .auth-card h2 { font-size: 17px; margin: 0 0 4px; }
  .auth-card .auth-sub { font-size: 12.5px; color: var(--muted); margin-bottom: 16px; line-height: 1.45; }
  .auth-field { margin-bottom: 12px; }
  .auth-field label { display: block; font-size: 11.5px; color: var(--muted); margin-bottom: 4px; }
  .auth-field input {
    width: 100%; font-size: 14px; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 9px; background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  .auth-field input:focus {
    outline: none; border-color: var(--support); box-shadow: 0 0 0 3px rgba(47,122,79,0.15);
  }
  #auth-submit {
    width: 100%; font-size: 14px; font-weight: 700; color: #fff; background: var(--support);
    border: none; border-radius: 9px; padding: 11px; cursor: pointer; margin-top: 4px;
  }
  #auth-submit:disabled { opacity: 0.55; cursor: default; }
  .auth-toggle { font-size: 12.5px; color: var(--muted); margin-top: 14px; text-align: center; }
  .auth-toggle a { color: var(--support); font-weight: 600; cursor: pointer; text-decoration: underline; }
  .auth-msg { font-size: 12.5px; margin-top: 12px; line-height: 1.4; }
  .auth-msg.err { color: var(--caution); }
  .auth-msg.ok { color: var(--support); }
  .account-bar {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    font-size: 12.5px; color: var(--muted); margin-bottom: 16px;
  }
  .account-bar button {
    font-size: 12px; font-weight: 600; color: var(--ink);
    background: var(--neutral-bg); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 12px; cursor: pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Portfolio BI</h1>
    <p>Scorecard trasparente — descrive lo stato, non prescrive decisioni</p>
  </header>

  <div id="loading">Caricamento scorecard…</div>
  <div id="error"></div>

  <div class="view-tabs" id="view-tabs" style="display:none">
    <button type="button" class="view-tab-btn active" data-view="dashboard">Il tuo portafoglio</button>
    <button type="button" class="view-tab-btn" data-view="analysis">Analisi &amp; Previsione</button>
  </div>

  <div id="content"></div>
  <div id="analysis-content" style="display:none"></div>

  <p class="disclaimer">Uso personale e informativo. Non è consulenza finanziaria.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="chart.js"></script>
<script src="ols.js"></script>
<script>
const markSymbol = { supportive: "+", caution: "!", neutral: "·" };
const markLabel = { supportive: "favorevole", caution: "attenzione", neutral: "neutro" };
const badgeClass = (score) => score >= 0.5 ? "support" : score <= -0.5 ? "caution" : "neutral";
const verdictText = (total) =>
  total >= 1 ? "Il quadro complessivo è favorevole." :
  total <= -1 ? "Il quadro complessivo invita a cautela." :
  "Il quadro complessivo è bilanciato.";
const pillarLabel = (score) =>
  score >= 1.5 ? "Strongly supportive" :
  score >= 0.5 ? "Supportive" :
  score > -0.5 ? "Balanced" :
  score > -1.5 ? "Caution" : "Strong caution";

let currentNav = null;
let latestCard = null;  // last-loaded scorecard, so the Analysis tab can re-render on portfolio change
const STORAGE_KEY = "portfolioBI_position";

let navHistory = [];  // [[isoDate, nav], ...] oldest first — public fund price history

// Mirrors run.py::nav_on_or_before — snaps back to the last trading day
// on/before dateIso (handles weekends/holidays). Returns null if dateIso
// is malformed or predates all available history.
function navOnOrBefore(history, dateIso) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(dateIso || "")) return null;
  let match = null;
  for (const [d, v] of history) {
    if (d <= dateIso) match = v;
    else break;
  }
  return match;
}

// Mirrors engine/scoring.py::pillar_position_multi — computed here, in
// the visitor's own browser, so personal figures never leave the
// device. Units are never asked for directly: implied by
// investedAmount / purchasePrice (the security's price on the purchase
// date, looked up from its pre-published history — see
// docs/data/tickers/*.json, generated by build_ticker_universe.py).
function computePortfolioSignals(holdings, portfolioValue) {
  const priced = holdings.filter(h => h.purchasePrice > 0 && h.currentPrice > 0);
  if (!priced.length) return null;

  const perHolding = priced.map(h => {
    const marketValue = h.investedAmount * h.currentPrice / h.purchasePrice;
    const pnlPct = (marketValue - h.investedAmount) / h.investedAmount * 100;
    return { ...h, marketValue, pnlPct };
  });

  const totalInvested = perHolding.reduce((s, h) => s + h.investedAmount, 0);
  const totalValue = perHolding.reduce((s, h) => s + h.marketValue, 0);
  const totalPnlPct = totalInvested ? (totalValue - totalInvested) / totalInvested * 100 : 0;

  const signals = [];
  if (totalPnlPct >= 25) {
    signals.push({ name: "Portfolio P&L (tracked holdings)", reading: `+${totalPnlPct.toFixed(0)}%`, points: -1,
      bias: "caution", why: "Sitting on a sizeable gain across your tracked holdings — a profit-taker would note the cushion." });
  } else if (totalPnlPct <= -15) {
    signals.push({ name: "Portfolio P&L (tracked holdings)", reading: `${totalPnlPct.toFixed(0)}%`, points: 0,
      bias: "neutral", why: "Underwater overall — decision hinges on whether your original thesis still holds." });
  } else {
    signals.push({ name: "Portfolio P&L (tracked holdings)", reading: `${totalPnlPct >= 0 ? "+" : ""}${totalPnlPct.toFixed(0)}%`,
      points: 0, bias: "neutral", why: "P&L is in a moderate range across your tracked holdings." });
  }

  for (const h of perHolding) {
    signals.push({ name: `${h.name} — P&L`, reading: `${h.pnlPct >= 0 ? "+" : ""}${h.pnlPct.toFixed(0)}%`,
      points: 0, bias: "neutral", why: "Per-holding unrealised P&L — informational, doesn't add to the score." });
    if (portfolioValue > 0) {
      const conc = h.marketValue / portfolioValue * 100;
      if (conc >= 30) {
        signals.push({ name: `${h.name} — Concentration`, reading: `${conc.toFixed(0)}% of portfolio`, points: -1,
          bias: "caution", why: "A large share of your declared portfolio value — concentration risk." });
      } else if (conc <= 10) {
        signals.push({ name: `${h.name} — Concentration`, reading: `${conc.toFixed(0)}% of portfolio`, points: 1,
          bias: "supportive", why: "A modest share of your declared portfolio value — room to size up if conviction is high." });
      } else {
        signals.push({ name: `${h.name} — Concentration`, reading: `${conc.toFixed(0)}% of portfolio`, points: 0,
          bias: "neutral", why: "A moderate share of your declared portfolio value." });
      }
    }
  }
  return signals;
}

let tickerList = [];
const tickerHistoryCache = {};

async function loadTickerList() {
  if (tickerList.length) return tickerList;
  tickerList = (await fetchJSON("data/ticker_list.json")) || [];
  return tickerList;
}

function searchTickers(query, limit = 8) {
  const q = query.trim().toLowerCase();
  if (q.length < 2) return [];
  // Rank: exact ticker > ticker starts-with > name starts-with > name contains.
  // Keeps "Apple Inc." (AAPL) above "Apple Hospitality REIT" when typing "apple".
  const scored = [];
  for (const t of tickerList) {
    const sym = t.symbol.toLowerCase(), name = t.name.toLowerCase();
    let score = null;
    if (sym === q) score = 0;
    else if (sym.startsWith(q)) score = 1;
    else if (name.startsWith(q)) score = 2;
    else if (name.includes(q) || sym.includes(q)) score = 3;
    if (score !== null) scored.push({ t, score });
  }
  // Tiebreak within the same match-quality by shorter name — "Apple Inc."
  // beats "Apple Hospitality REIT, Inc." as the more prominent match.
  scored.sort((a, b) => a.score - b.score || a.t.name.length - b.t.name.length
                        || a.t.name.localeCompare(b.t.name));
  return scored.slice(0, limit).map(s => s.t);
}

// Non-Yahoo assets whose history lives in a dedicated published file
// rather than data/tickers/<SYM>.json — currently just the BlackRock
// fund (scraped by run.py into nav_history.json), so it can be added to
// the private portfolio like any searchable ticker.
const SPECIAL_HISTORY_FILES = { "BGF-SE": "data/nav_history.json" };

async function getTickerHistory(symbol) {
  if (tickerHistoryCache[symbol]) return tickerHistoryCache[symbol];
  const url = SPECIAL_HISTORY_FILES[symbol] || `data/tickers/${encodeURIComponent(symbol)}.json`;
  const data = (await fetchJSON(url)) || [];
  tickerHistoryCache[symbol] = data;
  return data;
}

// Portfolio state. Each holding: {symbol, name, exchange, investedAmount,
// purchaseDate}. When login is configured, this is stored per-user in
// Supabase (cloud); otherwise it falls back to localStorage (dev). Prices/
// history are always looked up from the pre-published per-ticker files.
let portfolioState = { portfolioValue: "", holdings: [] };
let currentUser = null;
let _saveTimer = null;

function persistPortfolio() {
  const payload = { portfolioValue: portfolioState.portfolioValue, holdings: portfolioState.holdings };
  if (authConfigured() && currentUser) {
    // debounce cloud writes so rapid edits don't spam the DB
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => cloudSavePortfolio(payload), 500);
  } else {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }
}

// Load the portfolio for the current context (cloud when logged in, else
// localStorage). Called before rendering the portfolio section.
async function loadPortfolioState() {
  let d = null;
  if (authConfigured() && currentUser) {
    d = await cloudLoadPortfolio();
  } else {
    try { d = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"); } catch (e) { d = null; }
  }
  portfolioState = {
    portfolioValue: (d && d.portfolioValue) || "",
    holdings: (d && Array.isArray(d.holdings)) ? d.holdings : [],
  };
}

function timeAgo(date) {
  const s = Math.round((Date.now() - date.getTime()) / 1000);
  if (s < 10) return "aggiornato ora";
  if (s < 60) return `aggiornato ${s}s fa`;
  const m = Math.round(s / 60);
  if (m < 60) return `aggiornato ${m} min fa`;
  const h = Math.round(m / 60);
  return `aggiornato ${h} ${h === 1 ? "ora" : "ore"} fa`;
}

      <div class="auth-field">

      </div>
      <button id="auth-submit" type="button">${mode === "signin" ? "Accedi" : "Registrati"}</button>
      <div class="auth-msg" id="auth-msg"></div>
    `;
    const email = card.querySelector("#auth-email");
    const pw = card.querySelector("#auth-password");
    const submit = card.querySelector("#auth-submit");
    const msg = card.querySelector("#auth-msg");

    card.querySelector("#auth-switch").addEventListener("click", () => {
      mode = mode === "signin" ? "signup" : "signin"; paint();
    });

    submit.addEventListener("click", async () => {
      const e = email.value.trim(), p = pw.value;
      if (!e || p.length < 6) { msg.className = "auth-msg err"; msg.textContent = "Inserisci email e una password di almeno 6 caratteri."; return; }
      submit.disabled = true; msg.className = "auth-msg"; msg.textContent = "Attendi…";
      const res = mode === "signin" ? await authSignIn(e, p) : await authSignUp(e, p);
      if (res.error) {
        submit.disabled = false; msg.className = "auth-msg err"; msg.textContent = res.error.message;
        return;
      }
      if (mode === "signup" && !res.session) {
        // email confirmation is on — user created but no session yet
        msg.className = "auth-msg ok";
        msg.textContent = "Ti abbiamo inviato un'email di conferma. Aprila, conferma l'account, poi torna qui e accedi.";
        submit.disabled = false;
        return;
      }
      // success (session created) → authOnChange will re-render the app
    });

    pw.addEventListener("keydown", (ev) => { if (ev.key === "Enter") submit.click(); });
  }
  paint();
  content.appendChild(card);
}

// Parses the factor_regression pillar's existing signal text back into a
// clean table — no backend schema change needed, the "reading"/"why"
// strings already contain everything (see engine/scoring.py
// pillar_factor_regression, which writes them in this exact format).
function parseFactorSignal(s) {
  const readingMatch = s.reading.match(/coef=([+-][\d.]+), p=([\d.]+)/);
  const vifMatch = s.why.match(/VIF=([\d.]+)/);
  return {
    name: s.name,
    coef: readingMatch ? parseFloat(readingMatch[1]) : null,
    pvalue: readingMatch ? parseFloat(readingMatch[2]) : null,
    vif: vifMatch ? parseFloat(vifMatch[1]) : null,
    significant: s.bias !== "neutral",
    bias: s.bias,
  };
}

// Builds the coef/p-value/VIF table body from a factors object of the
// shape {key: {coef, pvalue, vif}} — used both by the static
// (scorecard-derived) table and the live per-asset browser regressions.
function regressionTableRows(factors) {
  return Object.entries(factors).map(([key, f]) => {
    const label = (typeof OLS_FACTOR_LABELS !== "undefined" && OLS_FACTOR_LABELS[key]) || key;
    const significant = f.pvalue != null && f.pvalue < 0.05;
    const sigBadge = significant
      ? `<span class="reg-badge yes">sì (p&lt;0.05)</span>`
      : `<span class="reg-badge no">no</span>`;
    const vifBadge = f.vif == null ? "—" :
      f.vif >= 10 ? `<span class="reg-badge vif-high">${f.vif.toFixed(1)} alto</span>` :
      f.vif.toFixed(1);
    const rowClass = significant ? (f.coef > 0 ? "sig-pos" : "sig-neg") : "";
    return `<tr class="${rowClass}">
      <td class="factor-name">${label}</td>
      <td class="num">${f.coef != null ? f.coef.toFixed(3) : "—"}</td>
      <td class="num">${f.pvalue != null ? f.pvalue.toFixed(3) : "—"}</td>
      <td>${sigBadge}</td>
      <td class="num">${vifBadge}</td>
    </tr>`;
  }).join("");
}

function regressionTableCard(title, narrative, subtitle, factors) {
  const card = document.createElement("div");
  card.className = "chart-card";
  // The plain-language narrative stays visible; the dense coefficient
  // table is tucked into a collapsible <details> so the default view
  // stays light for a non-expert (streamlining), while the full numbers
  // remain one click away for anyone who wants them.
  card.innerHTML = `
    <h2>${title}</h2>
    ${narrative ? `<div class="private-note" style="font-weight:600;color:var(--ink)">${narrative}</div>` : ""}
    ${subtitle ? `<div class="private-note">${subtitle}</div>` : ""}
    <details class="reg-details">
      <summary>Mostra i coefficienti (dettaglio tecnico)</summary>
      <div class="reg-table-wrap">
        <table class="reg-table">
          <thead><tr>
            <th>Fattore</th><th>Coefficiente</th><th>p-value</th><th>Significativo</th><th>VIF</th>
          </tr></thead>
          <tbody>${regressionTableRows(factors)}</tbody>
        </table>
      </div>
      <div class="private-note" style="margin-top:10px">
        Sensibilità storica del rendimento giornaliero dell'asset a ciascun fattore. Verde/rosso =
        relazione statisticamente significativa (p&lt;0.05) positiva/negativa. VIF alto (&gt;10) = il
        coefficiente è poco affidabile per collinearità con un altro fattore. Non è una previsione.
      </div>
    </details>
  `;
  return card;
}

// ── Plain-language interpretation of the whole picture ──
// Reads the market-context pillars (VIX level/trend, US 10Y) and the
// aggregated significant factors across the portfolio's regressions,
// and turns them into a few general bullet points for a user who has no
// time to read tables. GENERAL (across variables), not one-per-factor.
function findSignalReading(card, pillarKey, signalName) {
  const p = card.pillars.find(x => x.key === pillarKey);
  if (!p) return null;
  const s = p.signals.find(x => x.name.toUpperCase() === signalName.toUpperCase());
  return s ? s.reading : null;
}

function buildInterpretationBullets(card, regressionResults) {
  const bullets = [];

  // 1) market volatility / mood (VIX level + recent trend)
  const vixLevel = parseFloat(findSignalReading(card, "macro", "VIX") || "");
  const vixTrend = findSignalReading(card, "outlook", "VIX") || "";
  if (!isNaN(vixLevel)) {
    const mood = vixLevel <= 16 ? "basso: clima di mercato calmo, propenso al rischio"
               : vixLevel <= 24 ? "nella media" : "alto: clima di mercato teso";
    const dir = /rising/.test(vixTrend) ? ", ed è salito nell'ultimo mese"
              : /falling/.test(vixTrend) ? ", ed è sceso nell'ultimo mese" : "";
    bullets.push({ icon: "🌡️", text: `<strong>Volatilità di mercato:</strong> l'indice della paura (VIX) è ${mood}${dir}.` });
  }

  // 2) interest rates (US 10Y level + trend)
  const us10y = parseFloat((findSignalReading(card, "macro", "US 10Y") || "").replace("%", ""));
  const rateTrend = findSignalReading(card, "outlook", "US 10Y") || "";
  if (!isNaN(us10y)) {
    const dir = /rising/.test(rateTrend) ? "in leggera salita"
              : /falling/.test(rateTrend) ? "in leggero calo" : "stabile";
    const effect = /rising/.test(rateTrend)
        ? "tassi che salgono pesano di più sui titoli growth/tech e sui fondi a lunga scadenza"
        : /falling/.test(rateTrend)
        ? "tassi che scendono tendono ad alleggerire la pressione sui titoli growth"
        : "i tassi non stanno spingendo in una direzione netta";
    bullets.push({ icon: "🏦", text: `<strong>Tassi d'interesse:</strong> il rendimento USA a 10 anni è al ${us10y.toFixed(1)}% ed è ${dir} — ${effect}.` });
  }

  // 3) what actually moves the user's portfolio (aggregate reliable factors)
  const pos = new Set(), neg = new Set();
  for (const r of regressionResults) {
    if (!r.result || r.result.error) continue;
    for (const [k, v] of Object.entries(r.result.factors)) {
      const reliable = v.pvalue < 0.05 && (v.vif == null || v.vif < 10);
      if (reliable && v.coef > 0) pos.add(OLS_FACTOR_LABELS[k] || k);
      if (reliable && v.coef < 0) neg.add(OLS_FACTOR_LABELS[k] || k);
    }
  }
  if (pos.size || neg.size) {
    const parts = [];
    if (pos.size) parts.push(`si muove storicamente insieme a <strong>${[...pos].join(", ")}</strong>`);
    if (neg.size) parts.push(`tende a soffrire quando salgono <strong>${[...neg].join(", ")}</strong>`);
    bullets.push({ icon: "📊", text: `<strong>Cosa muove i tuoi titoli:</strong> il portafoglio ${parts.join("; ")}.` });
  } else if (regressionResults.length) {
    bullets.push({ icon: "📊", text: `<strong>Cosa muove i tuoi titoli:</strong> si muovono soprattutto per ragioni proprie, poco legate ai fattori macro tracciati qui.` });
  }

  return bullets;
}

function buildInterpretationCard(card, regressionResults) {
  const bullets = buildInterpretationBullets(card, regressionResults);
  if (!bullets.length) return null;
  const el = document.createElement("div");
  el.className = "interp-card";
  el.innerHTML = `
    <h2>In parole semplici — cosa dicono questi dati</h2>
    <div class="ic-sub">Una sintesi del contesto di mercato di oggi e di come si lega al tuo portafoglio.</div>
    <ul class="interp-bullets">
      ${bullets.map(b => `<li><span class="ib-icon">${b.icon}</span><span class="ib-text">${b.text}</span></li>`).join("")}
    </ul>
    <div class="interp-close">Sono una fotografia del presente e relazioni storiche, non previsioni. Servono a darti contesto — la decisione resta tua.</div>
  `;
  return el;
}

// Parse the static portfolio-level regression out of scorecard.json's
// factor_regression pillar (fallback when the user hasn't built a
// browser portfolio).
function staticRegressionFromCard(card) {
  const regPillar = card.pillars.find(p => p.key === "factor_regression");
  if (!regPillar || regPillar.signals.length < 2) return null;
  const factorSignals = regPillar.signals.filter(s => /coef=/.test(s.reading));
  if (!factorSignals.length) return null;
  const factors = {};
  for (const s of factorSignals) {
    const p = parseFactorSignal(s);
    factors[s.name] = { coef: p.coef, pvalue: p.pvalue, vif: p.vif };
  }
  const fit = regPillar.signals.find(s => /R²/.test(s.reading));
  return { factors, fitLine: fit ? fit.reading : "" };
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function chatAnswer(qRaw, ctx) {
  const q = qRaw.toLowerCase();
  const has = (...ws) => ws.some(w => q.includes(w));
  const holdings = (ctx && ctx.holdings) || [];
  const priced = holdings.filter(h => h.priced);

  // help
  if (has("aiuto", "help", "cosa posso", "che domande", "come funzioni", "cosa sai"))
    return "Puoi chiedermi, ad esempio:\n• Come va il mio portafoglio?\n• Qual è il titolo migliore / peggiore?\n• Cosa muove i miei titoli?\n• Com'è la volatilità (VIX)? E i tassi?\n• Sono troppo concentrato?\n• Cos'è il MOVE / DXY / R² / VIF?";

  // glossary / definitions
  if (has("cos'è", "cosa è", "cos e", "che cos", "significa", "spiega", "vuol dire")) {
    for (const [k, v] of Object.entries(CHAT_GLOSSARY)) if (q.includes(k)) return v;
  }

  // portfolio performance
  if (has("come va", "come sta", "performance", "andamento", "guadagn", "perdit", "sta andando", "quanto rendo", "quanto ho fatto")) {
    if (!priced.length) return "Non hai ancora posizioni con un prezzo valido. Aggiungi un titolo nella tab \"Il tuo portafoglio\".";
    const inv = priced.reduce((s, h) => s + h.invested, 0);
    const val = priced.reduce((s, h) => s + h.marketValue, 0);
    const pnl = (val - inv) / inv * 100;
    const lines = priced.map(h => `• ${h.name}: ${h.pnl >= 0 ? "+" : ""}${h.pnl.toFixed(0)}%`).join("\n");
    return `Il tuo portafoglio è a <strong>${pnl >= 0 ? "+" : ""}${pnl.toFixed(1)}%</strong> (${Math.round(inv).toLocaleString("it-IT")}€ → ${Math.round(val).toLocaleString("it-IT")}€ oggi).\nPer titolo:\n${lines}`;
  }

  // best / worst
  if (has("migliore", "meglio", "top", "che rende di più", "va meglio") && priced.length) {
    const b = priced.slice().sort((a, c) => c.pnl - a.pnl)[0];
    return `Il titolo che rende di più è <strong>${b.name}</strong>: ${b.pnl >= 0 ? "+" : ""}${b.pnl.toFixed(0)}%.`;
  }
  if (has("peggiore", "peggio", "va peggio", "rende di meno") && priced.length) {
    const w = priced.slice().sort((a, c) => a.pnl - c.pnl)[0];
    return `Il titolo che rende di meno è <strong>${w.name}</strong>: ${w.pnl >= 0 ? "+" : ""}${w.pnl.toFixed(0)}%.`;
  }

  // factor sensitivity
  if (has("cosa muove", "muove", "sensibil", "fattori", "dipende", "correla", "reagisce", "influenza")) {
    const pos = (ctx && ctx.factorsPos) || [], neg = (ctx && ctx.factorsNeg) || [];
    if (!pos.length && !neg.length) return "Sui dati storici il tuo portafoglio non ha una relazione statisticamente affidabile con i fattori macro tracciati: si muove soprattutto per ragioni proprie.";
    let r = "Storicamente il tuo portafoglio ";
    if (pos.length) r += `si muove insieme a <strong>${pos.join(", ")}</strong>`;
    if (pos.length && neg.length) r += "; ";
    if (neg.length) r += `soffre quando salgono <strong>${neg.join(", ")}</strong>`;
    return r + ". (relazione storica, non una previsione)";
  }

  // volatility / VIX
  if (has("vix", "volatil", "paura", "clima")) {
    const lvl = parseFloat(findSignalReading(ctx && ctx.card, "macro", "VIX") || "");
    const tr = findSignalReading(ctx && ctx.card, "outlook", "VIX") || "";
    if (isNaN(lvl)) return CHAT_GLOSSARY.vix;
    const mood = lvl <= 16 ? "basso, clima calmo e propenso al rischio" : lvl <= 24 ? "nella media" : "alto, clima teso";
    const dir = /rising/.test(tr) ? ", ed è salito nell'ultimo mese" : /falling/.test(tr) ? ", ed è sceso nell'ultimo mese" : "";
    return `Il VIX è a <strong>${lvl.toFixed(1)}</strong>: ${mood}${dir}.\n${CHAT_GLOSSARY.vix}`;
  }

  // rates
  if (has("tassi", "treasury", "10 anni", "rendimento del", "10y")) {
    const y = parseFloat((findSignalReading(ctx && ctx.card, "macro", "US 10Y") || "").replace("%", ""));
    const tr = findSignalReading(ctx && ctx.card, "outlook", "US 10Y") || "";
    if (isNaN(y)) return CHAT_GLOSSARY["us 10y"];
    const dir = /rising/.test(tr) ? "in salita" : /falling/.test(tr) ? "in calo" : "stabile";
    return `Il rendimento USA a 10 anni è al <strong>${y.toFixed(1)}%</strong> ed è ${dir}.\n${CHAT_GLOSSARY["us 10y"]}`;
  }

  // concentration
  if (has("concentr", "diversific", "troppo su", "peso")) {
    const pv = parseFloat(portfolioState.portfolioValue);
    if (!priced.length) return "Aggiungi almeno una posizione per valutare la concentrazione.";
    if (!(pv > 0)) return "Per la concentrazione, inserisci il \"Valore totale del portafoglio\" nella tab \"Il tuo portafoglio\".";
    const lines = priced.map(h => `• ${h.name}: ${(h.marketValue / pv * 100).toFixed(0)}%`).join("\n");
    const maxc = Math.max(...priced.map(h => h.marketValue / pv * 100));
    const verdict = maxc >= 30 ? "Una posizione supera il 30% del portafoglio: c'è rischio di concentrazione."
      : maxc <= 10 ? "Nessuna posizione domina: buona diversificazione (o posizioni ancora piccole)."
      : "Le posizioni hanno un peso moderato.";
    return `Peso di ogni posizione sul portafoglio dichiarato:\n${lines}\n${verdict}`;
  }

  // holding-specific
  if (priced.length) {
    const hit = priced.find(h => q.includes(h.name.toLowerCase().split(" ")[0]) || q.includes(h.symbol.toLowerCase()));
    if (hit) {
      let r = `${hit.name}: <strong>${hit.pnl >= 0 ? "+" : ""}${hit.pnl.toFixed(0)}%</strong> dalla data d'acquisto.`;
      const reg = (ctx.regressionByAsset || []).find(x => x.label === hit.name);
      if (reg && reg.result && !reg.result.error) r += "\n" + regressionNarrative(reg.result, hit.name);
      return r;
    }
  }

  return "Non sono sicuro di aver capito 🤔. Prova con: \"come va il mio portafoglio?\", \"cosa muove i miei titoli?\", \"com'è il VIX?\", \"cos'è il MOVE?\", oppure scrivi \"aiuto\".";
}

function renderChatThread(threadEl) {
  threadEl.innerHTML = chatMessages.map(m => `<div class="chat-msg ${m.role}">${m.text}</div>`).join("");
  threadEl.scrollTop = threadEl.scrollHeight;
}

function buildChatCard() {
  const card = document.createElement("div");
  card.className = "chart-card";
  const suggestions = ["Come va il mio portafoglio?", "Cosa muove i miei titoli?", "Com'è la volatilità (VIX)?", "Cos'è il MOVE?", "Sono troppo concentrato?"];
  card.innerHTML = `
    <h2>💬 Chiedi alla piattaforma</h2>
    <div class="private-note" style="margin-bottom:0">Fai una domanda sul tuo portafoglio o sui dati — le risposte sono basate sui tuoi numeri. Versione beta (senza AI generativa, ancora).</div>
    <div class="chat-suggestions">${suggestions.map(s => `<button type="button" class="chat-chip">${s}</button>`).join("")}</div>
    <div class="chat-thread" id="chat-thread"></div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" autocomplete="off" placeholder="Scrivi una domanda…">
      <button type="button" id="chat-send">Invia</button>
    </div>
  `;
  const thread = card.querySelector("#chat-thread");
  const input = card.querySelector("#chat-input");
  renderChatThread(thread);

  function send(text) {
    text = (text || "").trim();
    if (!text) return;
    chatMessages.push({ role: "user", text: escapeHtml(text) });
    chatMessages.push({ role: "bot", text: chatAnswer(text, chatContext) });
    renderChatThread(thread);
    input.value = "";
    input.focus();
  }
  card.querySelector("#chat-send").addEventListener("click", () => send(input.value));
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(input.value); });
  card.querySelectorAll(".chat-chip").forEach(c => c.addEventListener("click", () => send(c.textContent)));
  return card;
}

let analysisMacroHistory = null;

async function renderAnalysisTab(card) {
  latestCard = card;
  const el = document.getElementById("analysis-content");
  el.innerHTML = `<div class="chart-card"><div id="private-placeholder">Preparazione analisi…</div></div>`;

  if (!analysisMacroHistory) {
    analysisMacroHistory = await fetchJSON("data/macro_history.json");
  }

  // resolve the user's selected portfolio assets (from the browser) into
  // {key, label, history} for the chart + per-asset regressions
  const picked = [];
  for (const h of portfolioState.holdings) {
    const hist = await getTickerHistory(h.symbol);
    if (hist && hist.length) picked.push({ key: h.symbol, label: h.name, history: hist });
  }

  el.innerHTML = "";

  // ── chart ──
  const chartCard = document.createElement("div");
  chartCard.className = "chart-card";
  chartCard.innerHTML = `<h2>Andamento e proiezione</h2>
    <div class="private-note" style="margin-bottom:0">Tutte le serie sono indicizzate a 100 all'inizio del periodo, per essere confrontabili nonostante unità diverse (€, punti indice, %, $).${picked.length ? " Le linee asset sono i titoli del tuo portafoglio." : ""}</div>
    <div id="chart-container"></div>`;
  el.appendChild(chartCard);
  initChartSection(chartCard.querySelector("#chart-container"), {
    navHistory: "data/nav_history.json",
    macroHistory: "data/macro_history.json",
    extraSeries: picked,
  });

  // ── compute a regression per selected asset (in the browser) ──
  const regressionResults = [];
  if (picked.length && analysisMacroHistory) {
    for (const asset of picked) {
      regressionResults.push({ label: asset.label, result: runAssetRegression(asset.history, analysisMacroHistory) });
    }
  }

  // ── refresh the chat context from the same computed data ──
  const chatHoldings = portfolioState.holdings.map(h => {
    const hist = tickerHistoryCache[h.symbol] || [];
    const pp = navOnOrBefore(hist, h.purchaseDate);
    const cp = hist.length ? hist[hist.length - 1][1] : null;
    const isPriced = pp > 0 && cp > 0;
    return {
      name: h.name, symbol: h.symbol, invested: h.investedAmount, priced: isPriced,
      pnl: isPriced ? (cp / pp - 1) * 100 : null,
      marketValue: isPriced ? h.investedAmount * cp / pp : null,
    };
  });
  const cPos = new Set(), cNeg = new Set();
  for (const r of regressionResults) {
    if (!r.result || r.result.error) continue;
    for (const [k, v] of Object.entries(r.result.factors)) {
      const reliable = v.pvalue < 0.05 && (v.vif == null || v.vif < 10);
      if (reliable && v.coef > 0) cPos.add(OLS_FACTOR_LABELS[k] || k);
      if (reliable && v.coef < 0) cNeg.add(OLS_FACTOR_LABELS[k] || k);
    }
  }
  chatContext = { card, holdings: chatHoldings, factorsPos: [...cPos], factorsNeg: [...cNeg], regressionByAsset: regressionResults };

  // ── chat assistant, right under the chart ──
  el.appendChild(buildChatCard());

  // ── plain-language interpretation, prominent, right after the chart ──
  if (regressionResults.length || card.pillars.some(p => p.key === "macro")) {
    const interp = buildInterpretationCard(card, regressionResults);
    if (interp) el.appendChild(interp);
  }

  // ── per-asset regression detail (narrative visible, table collapsible) ──
  if (regressionResults.length) {
    const intro = document.createElement("div");
    intro.className = "private-note";
    intro.style.margin = "4px 0 0";
    intro.innerHTML = `<strong>Dettaglio per titolo</strong> — una regressione OLS per ciascun titolo del tuo portafoglio: quanto impatto ha storicamente ogni fattore macro sul suo rendimento giornaliero. Calcolata nel tuo browser, aggiornata quando cambi il portafoglio.`;
    el.appendChild(intro);

    for (const { label, result } of regressionResults) {
      if (result.error) {
        const c = document.createElement("div");
        c.className = "chart-card";
        c.innerHTML = `<h2>${label}</h2><div class="private-note">${result.error}</div>`;
        el.appendChild(c);
        continue;
      }
      const narrative = regressionNarrative(result, label);
      const subtitle = `Regressione OLS sui rendimenti giornalieri — R²=${result.r2.toFixed(2)} (adj. ${result.adjR2.toFixed(2)}), n=${result.n}. R² modesto è normale: i mercati non sono spiegati bene da un modello lineare.`;
      el.appendChild(regressionTableCard(`${label} — analisi fattoriale`, narrative, subtitle, result.factors));
    }
  } else {
    const c = document.createElement("div");
    c.className = "chart-card";
    c.innerHTML = `<h2>Analisi fattoriale (regressione OLS)</h2>
      <div class="private-note">Aggiungi almeno un titolo al tuo portafoglio nella tab "Il tuo portafoglio" per vedere qui l'interpretazione, il grafico con i tuoi titoli e una regressione OLS dedicata per ciascun asset.</div>`;
    el.appendChild(c);
  }

  // ── market context: current levels + recent trend of the macro
  // factors (from scorecard.json — market data, not personal). Same
  // signals the regressions above are run against. ──
  const contextPillars = card.pillars.filter(p => p.key === "macro" || p.key === "outlook");
  if (contextPillars.length) {
    const ctxIntro = document.createElement("div");
    ctxIntro.className = "private-note";
    ctxIntro.style.margin = "18px 0 6px";
    ctxIntro.innerHTML = `<strong>Contesto di mercato oggi</strong> — livello attuale e trend recente dei fattori macro sopra. Questi sono i dati con cui si incrocia il tuo portafoglio.`;
    el.appendChild(ctxIntro);

    const legend = document.createElement("div");
    legend.className = "legend";
    legend.innerHTML = ["supportive", "caution", "neutral"].map(b =>
      `<span><span class="mark ${b}">${markSymbol[b]}</span>${markLabel[b]}</span>`
    ).join("");
    el.appendChild(legend);

    for (const p of contextPillars) el.appendChild(pillarCard(p));
  }
}

function switchView(view) {
  document.getElementById("content").style.display = view === "dashboard" ? "block" : "none";
  document.getElementById("analysis-content").style.display = view === "analysis" ? "block" : "none";
  document.querySelectorAll(".view-tab-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.view === view));
}

async function load() {
  const loading = document.getElementById("loading");
  const err = document.getElementById("error");

  loading.style.display = "block";
  err.style.display = "none";

  try {
    const [cardRes, navHistRes] = await Promise.all([
      fetch("data/scorecard.json", { cache: "no-store" }),
      fetch("data/nav_history.json", { cache: "no-store" }),
      loadTickerList(),  // preload the searchable universe for the portfolio input
    ]);
    if (!cardRes.ok) throw new Error("scorecard.json non trovato nel repo.");
    const card = await cardRes.json();
    navHistory = navHistRes.ok ? await navHistRes.json() : [];
    loading.style.display = "none";
    currentNav = card.meta.nav;
    appCard = card;
    document.getElementById("view-tabs").style.display = "flex";

    if (authConfigured()) {
      if (!window.supabase) throw new Error("Impossibile caricare il modulo di login (Supabase SDK).");
      // onAuthStateChange fires INITIAL_SESSION immediately with the
      // restored session (or null) — that drives the first render, and
      // every later sign-in / sign-out re-renders too.
      authOnChange(async (user) => { currentUser = user; await renderGated(); });
    } else {
      await renderGated();  // localStorage fallback (dev / not configured)
    }
  } catch (e) {
    loading.style.display = "none";
    err.style.display = "block";
    err.textContent = e.message;
  }
}
document.querySelectorAll(".view-tab-btn").forEach(b =>
  b.addEventListener("click", () => switchView(b.dataset.view))
);
load();
</script>

</html>
