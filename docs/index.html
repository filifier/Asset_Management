<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio BI — Scorecard</title>
<style>
  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --ink: #1f2a24;
    --muted: #6b7a70;
    --border: #e4e0d6;
    --support: #2f7a4f;
    --support-bg: #e8f3ec;
    --caution: #b5502a;
    --caution-bg: #fbeee6;
    --neutral: #8a8478;
    --neutral-bg: #f1efe9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 32px 16px 64px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  header h1 { font-size: 22px; margin: 0 0 4px; }
  header p { margin: 0; color: var(--muted); font-size: 14px; }

  .asset-line {
    display: flex; justify-content: space-between; align-items: baseline;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
  }
  .asset-line .name { font-weight: 600; font-size: 15px; }
  .asset-line .nav { color: var(--muted); font-size: 14px; }

  .pillar {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
  }
  .pillar-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .pillar-head h2 { font-size: 15px; margin: 0; }
  .badge {
    font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px;
  }
  .badge.support { color: var(--support); background: var(--support-bg); }
  .badge.caution { color: var(--caution); background: var(--caution-bg); }
  .badge.neutral { color: var(--neutral); background: var(--neutral-bg); }

  .signal {
    display: flex; gap: 10px; padding: 8px 0;
    border-top: 1px solid var(--border);
  }
  .signal:first-child { border-top: none; }
  .mark {
    flex: 0 0 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; margin-top: 1px;
  }
  .mark.supportive { color: var(--support); background: var(--support-bg); }
  .mark.caution { color: var(--caution); background: var(--caution-bg); }
  .mark.neutral { color: var(--neutral); background: var(--neutral-bg); }
  .signal-body .name { font-weight: 600; font-size: 13.5px; }
  .signal-body .reading { color: var(--muted); font-size: 13px; margin-left: 6px; }
  .signal-body .why { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  .summary {
    background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid var(--neutral);
    border-radius: 12px; padding: 16px 20px; font-size: 13.5px; color: var(--ink);
    line-height: 1.5;
  }
  .summary.support-lean { border-left-color: var(--support); }
  .summary.caution-lean { border-left-color: var(--caution); }

  .disclaimer {
    margin-top: 24px; font-size: 11.5px; color: var(--muted); text-align: center;
  }
  #error {
    display: none; background: var(--caution-bg); color: var(--caution);
    border-radius: 12px; padding: 16px 20px; font-size: 13.5px; line-height: 1.5;
  }
  #error code {
    background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px;
  }
  #loading {
    text-align: center; color: var(--muted); font-size: 13.5px; padding: 40px 0;
  }

  .overview {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 20px;
  }
  .overview-top {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .overview .name { font-weight: 600; font-size: 15px; }
  .overview .nav { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .overview .verdict {
    font-size: 13.5px; margin-top: 10px; color: var(--ink); line-height: 1.4;
  }
  .refresh-row {
    display: flex; align-items: center; gap: 10px; margin-top: 12px;
  }
  .updated-at { font-size: 11.5px; color: var(--muted); }
  #refresh-btn {
    font-size: 12.5px; font-weight: 600; color: var(--ink);
    background: var(--neutral-bg); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 12px; cursor: pointer;
  }
  #refresh-btn:hover { background: var(--border); }
  #refresh-btn:disabled { opacity: 0.6; cursor: default; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--muted);
    margin-bottom: 16px; padding: 0 4px;
  }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend .mark { flex: 0 0 16px; height: 16px; font-size: 10px; margin-top: 0; }

  .private {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
  }
  .private-head h2 { font-size: 15px; margin: 0 0 4px; }
  .private-note {
    font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.4;
  }
  .private-form {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 6px;
  }
  .private-form label {
    display: block; font-size: 11.5px; color: var(--muted); margin-bottom: 4px;
  }
  .private-form input {
    width: 100%; font-size: 13.5px; padding: 7px 9px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  .private-form input:focus { outline: 2px solid var(--support); outline-offset: 1px; }
  .remember-row {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted);
    margin: 10px 0 4px;
  }
  #private-results { margin-top: 12px; }
  #private-results .signal:first-child { border-top: 1px solid var(--border); }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-wrap label {
    display: block; font-size: 11.5px; color: var(--muted); margin-bottom: 4px;
  }
  .search-wrap input {
    width: 100%; font-size: 13.5px; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  .search-wrap input:focus { outline: 2px solid var(--support); outline-offset: 1px; }
  .search-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; z-index: 10;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    max-height: 260px; overflow-y: auto; box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }
  .search-result {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 9px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover { background: var(--neutral-bg); }
  .search-result .sr-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .search-result .sr-meta { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .search-empty { padding: 12px; font-size: 12.5px; color: var(--muted); font-style: italic; }

  .selected-chip {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--support-bg); border: 1px solid var(--support);
    border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 13px;
  }
  .selected-chip .sc-name { font-weight: 600; color: var(--support); }
  .selected-chip .sc-meta { color: var(--muted); font-size: 11.5px; margin-left: 6px; }
  .selected-chip button {
    background: none; border: none; color: var(--muted); font-size: 12px;
    cursor: pointer; font-weight: 600; text-decoration: underline;
  }

  .add-holding-form {
    display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end;
    margin-bottom: 14px;
  }
  .add-holding-form label {
    display: block; font-size: 11.5px; color: var(--muted); margin-bottom: 4px;
  }
  .add-holding-form input {
    width: 100%; font-size: 13.5px; padding: 7px 9px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  #add-holding-btn {
    font-size: 13px; font-weight: 600; color: #fff; background: var(--support);
    border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; white-space: nowrap;
  }
  #add-holding-btn:disabled { opacity: 0.5; cursor: default; }

  .holdings-list { margin-bottom: 14px; }
  .holding-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-top: 1px solid var(--border); gap: 10px;
  }
  .holding-row .hr-name { font-size: 13px; font-weight: 600; }
  .holding-row .hr-meta { font-size: 11.5px; color: var(--muted); }
  .holding-row .hr-pnl { font-size: 13px; font-weight: 700; white-space: nowrap; }
  .holding-row .hr-pnl.positive { color: var(--support); }
  .holding-row .hr-pnl.negative { color: var(--caution); }
  .holding-row .hr-remove {
    background: none; border: none; color: var(--muted); font-size: 16px;
    cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .holding-row .hr-remove:hover { color: var(--caution); }

  /* ── prominent search hero ── */
  .search-hero {
    background: var(--card); border: 1.5px solid var(--support);
    border-radius: 14px; padding: 16px 18px; margin-bottom: 18px;
    box-shadow: 0 2px 10px rgba(47,122,79,0.06);
  }
  .search-hero .sh-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; gap: 10px;
  }
  .search-hero h3 { font-size: 15px; margin: 0; color: var(--ink); }
  #pf-refresh, #pf-import {
    font-size: 12px; font-weight: 600; color: var(--support);
    background: var(--support-bg); border: 1px solid var(--support);
    border-radius: 999px; padding: 5px 12px; cursor: pointer; white-space: nowrap;
  }
  #pf-refresh:hover, #pf-import:hover { background: #dcecdf; }
  #pf-refresh:disabled { opacity: 0.55; cursor: default; }
  .search-box { position: relative; }
  .search-box .s-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; opacity: 0.45; pointer-events: none;
  }
  .search-box input {
    width: 100%; font-size: 15px; padding: 13px 14px 13px 40px;
    border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  .search-box input:focus {
    outline: none; border-color: var(--support);
    box-shadow: 0 0 0 3px rgba(47,122,79,0.15); background: var(--card);
  }

  /* ── portfolio performance summary ── */
  .perf-summary {
    display: flex; justify-content: space-between; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid var(--neutral);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 14px;
  }
  .perf-summary.pos { border-left-color: var(--support); }
  .perf-summary.neg { border-left-color: var(--caution); }
  .perf-summary .perf-label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .perf-summary .perf-value { font-size: 30px; font-weight: 800; line-height: 1.1; margin: 2px 0; }
  .perf-summary .perf-value.pos { color: var(--support); }
  .perf-summary .perf-value.neg { color: var(--caution); }
  .perf-summary .perf-sub { font-size: 12.5px; color: var(--muted); }

  /* ── holding cards (chosen securities + performance) ── */
  .holding-card {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 8px;
  }
  .holding-card .hc-name { font-size: 14px; font-weight: 700; }
  .holding-card .hc-meta { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .holding-card .hc-conc { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .holding-card .hc-right { display: flex; align-items: center; gap: 14px; }
  .holding-card .hc-pnl { font-size: 20px; font-weight: 800; white-space: nowrap; }
  .holding-card .hc-pnl.pos { color: var(--support); }
  .holding-card .hc-pnl.neg { color: var(--caution); }
  .holding-card .hc-pnl.na { color: var(--muted); font-size: 14px; }
  .holding-card .hr-remove {
    background: none; border: none; color: var(--muted); font-size: 18px;
    cursor: pointer; padding: 0 2px; line-height: 1;
  }
  .holding-card .hr-remove:hover { color: var(--caution); }

  .news-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px; margin-top: 16px;
  }
  .news-card h2 { font-size: 15px; margin: 0 0 2px; }
  .news-sub { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .news-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .news-item:last-child { border-bottom: none; padding-bottom: 2px; }
  .news-item a {
    color: var(--ink); text-decoration: none; font-weight: 600;
    font-size: 13.5px; line-height: 1.35;
  }
  .news-item a:hover { text-decoration: underline; }
  .news-meta {
    font-size: 11.5px; color: var(--muted); margin-top: 3px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .news-tag {
    background: var(--support-bg); color: var(--support);
    border-radius: 999px; padding: 1px 8px; font-weight: 600; font-size: 10.5px;
  }
  .news-tag.topic { background: var(--neutral-bg); color: var(--muted); }

  #private-placeholder {
    font-size: 12.5px; color: var(--muted); font-style: italic; margin-top: 8px;
  }

  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
  }
  .chart-card h2 { font-size: 15px; margin: 0 0 4px; }

  .analysis-section {
    display: flex; align-items: baseline; gap: 10px;
    margin: 28px 0 12px;
  }
  .analysis-section:first-of-type { margin-top: 22px; }
  .analysis-section .as-num {
    flex: 0 0 auto; width: 24px; height: 24px; border-radius: 50%;
    background: var(--ink); color: var(--card);
    font-size: 12px; font-weight: 700; line-height: 24px; text-align: center;
  }
  .analysis-section .as-text { flex: 1 1 auto; }
  .analysis-section h1 { font-size: 16px; margin: 0; color: var(--ink); }
  .analysis-section .as-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .analysis-section .as-rule {
    border: none; border-top: 1px solid var(--border); margin: 8px 0 0;
  }
  .analysis-section .as-score {
    flex: 0 0 auto; font-size: 11.5px; font-weight: 700; white-space: nowrap;
    padding: 3px 10px; border-radius: 999px; background: var(--neutral-bg);
    color: var(--muted); border: 1px solid var(--border);
  }

  .qs-headline { display: flex; gap: 14px; flex-wrap: wrap; margin: 10px 0 12px; }
  .qs-box {
    flex: 1 1 180px; border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; background: var(--bg);
  }
  .qs-box .qs-label { font-size: 11.5px; color: var(--muted); font-weight: 600; }
  .qs-box .qs-value { font-size: 26px; font-weight: 800; color: var(--ink); }
  .qs-box .qs-note { font-size: 11.5px; color: var(--muted); }
  .qs-bar { height: 6px; border-radius: 999px; background: var(--border); margin: 6px 0 4px; overflow: hidden; }
  .qs-bar > div { height: 100%; border-radius: 999px; background: var(--support); }
  .qs-bar.risk > div { background: var(--caution); }
  .chart-controls {
    display: flex; gap: 6px; margin: 10px 0;
  }
  .chart-range-btn {
    font-size: 12px; font-weight: 600; color: var(--muted);
    background: var(--neutral-bg); border: 1px solid var(--border);
    border-radius: 999px; padding: 4px 11px; cursor: pointer;
  }
  .chart-range-btn.active { color: var(--ink); background: var(--border); }
  .chart-range-btn:hover { background: var(--border); }
  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 4px;
  }
  .chart-legend-item {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--muted); cursor: pointer;
  }
  .chart-swatch {
    width: 12px; height: 3px; border-radius: 2px; display: inline-block;
  }
  .chart-svg-holder { margin-top: 10px; }
  .chart-svg-holder svg { width: 100%; height: auto; display: block; }

  .view-tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .view-tab-btn {
    font-size: 13.5px; font-weight: 600; color: var(--muted);
    background: none; border: none; border-bottom: 2px solid transparent;
    padding: 8px 4px; margin-bottom: -1px; cursor: pointer;
  }
  .view-tab-btn.active { color: var(--ink); border-bottom-color: var(--support); }
  .view-tab-btn:hover { color: var(--ink); }

  .reg-table-wrap { overflow-x: auto; margin-top: 10px; }
  .reg-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .reg-table th, .reg-table td {
    text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .reg-table th { color: var(--muted); font-weight: 600; font-size: 11.5px; }
  .reg-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .reg-table tr.sig-pos td.factor-name { color: var(--support); }
  .reg-table tr.sig-neg td.factor-name { color: var(--caution); }
  .reg-badge {
    display: inline-block; font-size: 10.5px; font-weight: 700;
    padding: 1px 6px; border-radius: 999px;
  }
  .reg-badge.yes { color: var(--support); background: var(--support-bg); }
  .reg-badge.no { color: var(--muted); background: var(--neutral-bg); }
  .reg-badge.vif-high { color: var(--caution); background: var(--caution-bg); }

  /* ── plain-language interpretation ── */
  .interp-card {
    background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid var(--support);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 16px;
  }
  .interp-card h2 { font-size: 15px; margin: 0 0 4px; }
  .interp-card .ic-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .interp-bullets { list-style: none; margin: 0; padding: 0; }
  .interp-bullets li {
    display: flex; gap: 11px; padding: 9px 0; font-size: 13.5px; line-height: 1.45;
    border-top: 1px solid var(--border); color: var(--ink);
  }
  .interp-bullets li:first-child { border-top: none; }
  .interp-bullets .ib-icon { flex: 0 0 22px; font-size: 16px; line-height: 1.3; }
  .interp-close {
    font-size: 12px; color: var(--muted); margin-top: 10px; font-style: italic;
    border-top: 1px solid var(--border); padding-top: 10px;
  }

  /* ── collapsible technical detail ── */
  .reg-details { margin-top: 6px; }
  .reg-details summary {
    cursor: pointer; font-size: 12px; color: var(--support); font-weight: 600;
    padding: 4px 0; list-style: none; user-select: none;
  }
  .reg-details summary::-webkit-details-marker { display: none; }
  .reg-details summary::before { content: "▸  "; }
  .reg-details[open] summary::before { content: "▾  "; }

  /* ── chat assistant (rule-based, beta) ── */
  .chat-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 10px; }
  .chat-chip {
    font-size: 12px; color: var(--support); background: var(--support-bg);
    border: 1px solid var(--support); border-radius: 999px; padding: 5px 11px; cursor: pointer;
  }
  .chat-chip:hover { background: #dcecdf; }
  .chat-thread {
    display: flex; flex-direction: column; gap: 8px; margin: 4px 0 12px;
    max-height: 320px; overflow-y: auto;
  }
  .chat-thread:empty { display: none; }
  .chat-msg {
    max-width: 88%; padding: 9px 13px; border-radius: 13px; font-size: 13.5px;
    line-height: 1.45; white-space: pre-wrap; word-wrap: break-word;
  }
  .chat-msg.user { align-self: flex-end; background: var(--support); color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.bot { align-self: flex-start; background: var(--neutral-bg); color: var(--ink); border-bottom-left-radius: 4px; }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row input {
    flex: 1; font-size: 14px; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 10px; background: var(--bg); color: var(--ink); box-sizing: border-box;
  }
  .chat-input-row input:focus { outline: none; border-color: var(--support); box-shadow: 0 0 0 3px rgba(47,122,79,0.15); }
  .chat-input-row button {
    font-size: 14px; font-weight: 700; color: #fff; background: var(--support);
    border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer;
  }

  /* ── login / account ── */
  .auth-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 16px; max-width: 420px;
  }
  .auth-card h2 { font-size: 17px; margin: 0 0 4px; }
  .auth-card .auth-sub { font-size: 12.5px; color: var(--muted); margin-bottom: 16px; line-height: 1.45; }
  .auth-field { margin-bottom: 12px; }

<script>
const markSymbol = { supportive: "+", caution: "!", neutral: "·" };
const markLabel = { supportive: "favorevole", caution: "attenzione", neutral: "neutro" };
const badgeClass = (score) => score >= 0.5 ? "support" : score <= -0.5 ? "caution" : "neutral";
const verdictText = (total) =>
  total >= 1 ? "Il quadro complessivo è favorevole." :
  total <= -1 ? "Il quadro complessivo invita a cautela." :
  "Il quadro complessivo è bilanciato.";
const pillarLabel = (score) =>
  score >= 1.5 ? "Strongly supportive" :
  score >= 0.5 ? "Supportive" :
  score > -0.5 ? "Balanced" :
  score > -1.5 ? "Caution" : "Strong caution";

let currentNav = null;
let latestCard = null;  // last-loaded scorecard, so the Analysis tab can re-render on portfolio change
const STORAGE_KEY = "portfolioBI_position";

let navHistory = [];  // [[isoDate, nav], ...] oldest first — public fund price history

// Mirrors run.py::nav_on_or_before — snaps back to the last trading day
// on/before dateIso (handles weekends/holidays). Returns null if dateIso
// is malformed or predates all available history.
function navOnOrBefore(history, dateIso) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(dateIso || "")) return null;
  let match = null;
  for (const [d, v] of history) {
    if (d <= dateIso) match = v;
    else break;
  }
  return match;
}

// Mirrors engine/scoring.py::pillar_position_multi — computed here, in
// the visitor's own browser, so personal figures never leave the
// device. Units are never asked for directly: implied by
// investedAmount / purchasePrice (the security's price on the purchase
// date, looked up from its pre-published history — see
// docs/data/tickers/*.json, generated by build_ticker_universe.py).
function computePortfolioSignals(holdings, portfolioValue) {
  const priced = holdings.filter(h => h.purchasePrice > 0 && h.currentPrice > 0);
  if (!priced.length) return null;

  const perHolding = priced.map(h => {
    const marketValue = h.investedAmount * h.currentPrice / h.purchasePrice;
    const pnlPct = (marketValue - h.investedAmount) / h.investedAmount * 100;
    return { ...h, marketValue, pnlPct };
  });

  const totalInvested = perHolding.reduce((s, h) => s + h.investedAmount, 0);
  const totalValue = perHolding.reduce((s, h) => s + h.marketValue, 0);
  const totalPnlPct = totalInvested ? (totalValue - totalInvested) / totalInvested * 100 : 0;

  const signals = [];
  if (totalPnlPct >= 25) {
    signals.push({ name: "Portfolio P&L (tracked holdings)", reading: `+${totalPnlPct.toFixed(0)}%`, points: -1,
      bias: "caution", why: "Sitting on a sizeable gain across your tracked holdings — a profit-taker would note the cushion." });
  } else if (totalPnlPct <= -15) {
    signals.push({ name: "Portfolio P&L (tracked holdings)", reading: `${totalPnlPct.toFixed(0)}%`, points: 0,
      bias: "neutral", why: "Underwater overall — decision hinges on whether your original thesis still holds." });
  } else {
    signals.push({ name: "Portfolio P&L (tracked holdings)", reading: `${totalPnlPct >= 0 ? "+" : ""}${totalPnlPct.toFixed(0)}%`,
      points: 0, bias: "neutral", why: "P&L is in a moderate range across your tracked holdings." });
  }

  for (const h of perHolding) {
    signals.push({ name: `${h.name} — P&L`, reading: `${h.pnlPct >= 0 ? "+" : ""}${h.pnlPct.toFixed(0)}%`,
      points: 0, bias: "neutral", why: "Per-holding unrealised P&L — informational, doesn't add to the score." });
    if (portfolioValue > 0) {
      const conc = h.marketValue / portfolioValue * 100;
      if (conc >= 30) {
        signals.push({ name: `${h.name} — Concentration`, reading: `${conc.toFixed(0)}% of portfolio`, points: -1,
          bias: "caution", why: "A large share of your declared portfolio value — concentration risk." });
      } else if (conc <= 10) {
        signals.push({ name: `${h.name} — Concentration`, reading: `${conc.toFixed(0)}% of portfolio`, points: 1,
          bias: "supportive", why: "A modest share of your declared portfolio value — room to size up if conviction is high." });
      } else {
        signals.push({ name: `${h.name} — Concentration`, reading: `${conc.toFixed(0)}% of portfolio`, points: 0,
          bias: "neutral", why: "A moderate share of your declared portfolio value." });
      }
    }
  }
  return signals;
}

let tickerList = [];
const tickerHistoryCache = {};

async function loadTickerList() {
  if (tickerList.length) return tickerList;
  tickerList = (await fetchJSON("data/ticker_list.json")) || [];
  return tickerList;
}

function searchTickers(query, limit = 8) {
  const q = query.trim().toLowerCase();
  if (q.length < 2) return [];
  // Rank: exact ticker > ticker starts-with > name starts-with > name contains.
  // Keeps "Apple Inc." (AAPL) above "Apple Hospitality REIT" when typing "apple".
  const scored = [];
  for (const t of tickerList) {
    const sym = t.symbol.toLowerCase(), name = t.name.toLowerCase();
    let score = null;
    if (sym === q) score = 0;
    else if (sym.startsWith(q)) score = 1;
    else if (name.startsWith(q)) score = 2;
    else if (name.includes(q) || sym.includes(q)) score = 3;
    if (score !== null) scored.push({ t, score });
  }
  // Tiebreak within the same match-quality by shorter name — "Apple Inc."
  // beats "Apple Hospitality REIT, Inc." as the more prominent match.
  scored.sort((a, b) => a.score - b.score || a.t.name.length - b.t.name.length
                        || a.t.name.localeCompare(b.t.name));
  return scored.slice(0, limit).map(s => s.t);
}

// Non-Yahoo assets whose history lives in a dedicated published file
// rather than data/tickers/<SYM>.json — currently just the BlackRock
// fund (scraped by run.py into nav_history.json), so it can be added to
// the private portfolio like any searchable ticker.
const SPECIAL_HISTORY_FILES = { "BGF-SE": "data/nav_history.json" };

async function getTickerHistory(symbol) {
  if (tickerHistoryCache[symbol]) return tickerHistoryCache[symbol];
  const url = SPECIAL_HISTORY_FILES[symbol] || `data/tickers/${encodeURIComponent(symbol)}.json`;
  const data = (await fetchJSON(url)) || [];
  tickerHistoryCache[symbol] = data;
  return data;
}

// Portfolio state. Each holding: {symbol, name, exchange, investedAmount,
// purchaseDate}. When login is configured, this is stored per-user in
// Supabase (cloud); otherwise it falls back to localStorage (dev). Prices/
// history are always looked up from the pre-published per-ticker files.
let portfolioState = { portfolioValue: "", holdings: [] };
let currentUser = null;
let userProfile = null;  // {score, label, desc, answers} — computeRiskProfile() result, or null until answered
let _profileScreenActive = false;  // guards the onboarding form against being wiped by background auth re-renders
let _renderedForUid = null;  // uid the app is currently rendered for — skip redundant re-renders (see renderGated)
let _saveTimer = null;

// Per-user localStorage cache for the investor profile — a fallback for
// when the Supabase `profiles` table is unreachable (e.g. not created
// yet), so login is never trapped in the onboarding loop. Namespaced by
// user id to avoid leaking one account's profile to another on a shared
// browser.
function _profileKey(userId) { return "investorProfile:" + userId; }
function loadLocalProfile(userId) {
  try { return JSON.parse(localStorage.getItem(_profileKey(userId)) || "null"); } catch (e) { return null; }
}
function saveLocalProfile(userId, answers) {
  try { localStorage.setItem(_profileKey(userId), JSON.stringify(answers)); } catch (e) { /* quota / private mode */ }
}

function persistPortfolio() {
  const payload = { portfolioValue: portfolioState.portfolioValue, holdings: portfolioState.holdings };
  if (authConfigured() && currentUser) {
    // debounce cloud writes so rapid edits don't spam the DB
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => cloudSavePortfolio(payload), 500);
  } else {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }
}

// Load the portfolio for the current context (cloud when logged in, else
// localStorage). Called before rendering the portfolio section.
async function loadPortfolioState() {
  let d = null;
  if (authConfigured() && currentUser) {
    d = await cloudLoadPortfolio();
  } else {
    try { d = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null"); } catch (e) { d = null; }
  }
  portfolioState = {
    portfolioValue: (d && d.portfolioValue) || "",
    holdings: (d && Array.isArray(d.holdings)) ? d.holdings : [],
  };
}

// ---- news: the 3 headlines most relevant to the user's own portfolio ----
// data/news.json is built by run.py from the official RSS feeds of Yahoo
// Finance, Investing.com, MarketWatch, CNBC, Seeking Alpha and Reuters —
// headline + link + source only. Items arrive pre-tagged with tickers and
// macro topics; the per-user ranking happens here because the portfolio
// lives in the browser session, not in the build step.
const NEWS_TOPIC_LABELS = {
  tassi: "tassi & banche centrali", inflazione: "inflazione", petrolio: "petrolio",
  oro: "oro", valute: "valute", volatilita: "volatilità", "ai-chip": "AI & chip",
  energia: "energia", utili: "utili societari", cripto: "cripto",
  azionario: "azionario", geopolitica: "geopolitica",
  salute: "salute & farma", auto: "auto & EV", industria: "industria & difesa", consumo: "consumi",
};
let newsData = null;  // {generated, items} — loaded once per session
let _newsLoading = null;  // in-flight promise, so concurrent callers don't double-fetch
let tickerSectors = null;  // {BASE_SYMBOL: [themes]} — sector tags for content-based news matching

async function loadNews() {
  if (newsData !== null) return newsData;
  if (!_newsLoading) _newsLoading = fetchJSON("data/news.json").then(d => { newsData = d || { items: [] }; return newsData; });
  return _newsLoading;
}

// Loaded alongside news; used to match holdings to news BY TOPIC so the
// news responds to the portfolio even for funds/ETFs never named in a
// headline (built by engine/news.py::build_ticker_sectors).
async function loadTickerSectors() {
  if (tickerSectors === null) tickerSectors = (await fetchJSON("data/ticker_sectors.json")) || {};
  return tickerSectors;
}

function newsBaseSymbol(sym) { return sym.split(".")[0].split("-")[0].toUpperCase(); }

// The set of sector themes the CURRENT portfolio is exposed to — the
// union of each holding's sector tags. This is what makes the news react
// to adding/removing an asset: change the holdings, change the themes.
function portfolioThemes(holdings) {
  const themes = new Set();
  for (const h of holdings) {
    for (const t of (tickerSectors && tickerSectors[newsBaseSymbol(h.symbol)]) || []) themes.add(t);
  }
  return themes;
}

// Relevance for the "Top 3": a direct mention of a held ticker is the
// strongest signal; a news TOPIC that overlaps the portfolio's sector
// themes is the next (this is what changes when you add/remove an asset,
// even a fund never named in headlines); then freshness. Returns
// [{item, mine, matchedThemes, s}].
function newsTopPicks(items, holdings, n = 3) {
  const held = new Set(holdings.map(h => newsBaseSymbol(h.symbol)));
  const themes = portfolioThemes(holdings);
  const now = Date.now();
  return items.map(item => {
    const mine = (item.tickers || []).filter(t => held.has(t));
    const matchedThemes = (item.topics || []).filter(t => themes.has(t));
    let s = mine.length * 5 + matchedThemes.length * 2;
    const hrs = (now - new Date(item.published).getTime()) / 3.6e6;
    s += Math.max(0, 2 - hrs / 24);
    return { item, mine, matchedThemes, s };
  }).sort((a, b) => b.s - a.s).slice(0, n);
}

// The portfolio's sector themes, ranked by how many holdings share each —
// a description of "what sectors am I in", derived from the holdings
// themselves (not from whether they happen to appear in the news).
function sectorTopicsFromHoldings(items, holdings) {
  const counts = {};
  for (const h of holdings) {
    for (const t of (tickerSectors && tickerSectors[newsBaseSymbol(h.symbol)]) || []) counts[t] = (counts[t] || 0) + 1;
  }
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([t]) => t);
}

// Broader than newsTopPicks: matches news to the portfolio's SECTOR
// themes and to the investor profile's preferred themes — so a
// Conservativo and a Dinamico with the same holdings see a different mix,
// and adding/removing an asset shifts the sector themes. Returns
// [{item, mine, matchedTopics, s}].
function newsRelevantForProfile(items, holdings, profile, n = 6) {
  const held = new Set(holdings.map(h => newsBaseSymbol(h.symbol)));
  const sectorTopics = portfolioThemes(holdings);
  const boostTopics = new Set((profile && PROFILE_TOPIC_BOOST[profile.label]) || []);
  const now = Date.now();
  return items.map(item => {
    const mine = (item.tickers || []).filter(t => held.has(t));
    const topics = item.topics || [];
    const matchedTopics = topics.filter(t => sectorTopics.has(t) || boostTopics.has(t));
    let s = mine.length * 4 + topics.filter(t => sectorTopics.has(t)).length * 2
          + topics.filter(t => boostTopics.has(t)).length * 1;
    const hrs = (now - new Date(item.published).getTime()) / 3.6e6;
    s += Math.max(0, 2 - hrs / 24);
    return { item, mine, matchedTopics, s };
  }).filter(x => x.s > 0).sort((a, b) => b.s - a.s).slice(0, n);
}

function newsAgo(iso) {
  const h = (Date.now() - new Date(iso).getTime()) / 3.6e6;
  if (h < 1) return "meno di un'ora fa";
  if (h < 24) return `${Math.round(h)} h fa`;
  const d = Math.round(h / 24);
  return d === 1 ? "ieri" : `${d} giorni fa`;
}

async function renderNewsCard(container) {
  if (!container) return;
  const [data] = await Promise.all([loadNews(), loadTickerSectors()]);
  if (!data.items || !data.items.length) { container.innerHTML = ""; return; }
  const picks = newsTopPicks(data.items, portfolioState.holdings);
  const rows = picks.map(({ item, mine }) => {
    const tags = [
      ...(mine.length ? [`<span class="news-tag">riguarda i tuoi titoli</span>`] : []),
      ...(item.topics || []).slice(0, 2).map(t => `<span class="news-tag topic">${NEWS_TOPIC_LABELS[t] || t}</span>`),
    ].join("");
    return `<div class="news-item">
      <a href="${item.url.replace(/"/g, "&quot;")}" target="_blank" rel="noopener">${escapeHtml(item.title)}</a>
      <div class="news-meta"><span>${item.source} · ${newsAgo(item.published)}</span>${tags}</div>
    </div>`;
  }).join("");
  container.innerHTML = `<div class="news-card">
    <h2>📰 Top 3 notizie per te</h2>
    <div class="news-sub">Selezionate incrociando i tuoi titoli e i temi macro. Fonti: Yahoo Finance, Investing.com, MarketWatch, CNBC, Seeking Alpha, Reuters${data.generated ? ` — aggiornate ${newsAgo(data.generated)}` : ""}. Articoli in inglese.</div>
    ${rows}
  </div>`;
}

function buildPrivateSection() {
  const el = document.createElement("div");
  el.className = "private";
  const todayIso = new Date().toISOString().slice(0, 10);

  el.innerHTML = `
    <div class="private-head"><h2>Il tuo portafoglio</h2></div>
    <div class="private-note">
      Il tuo portafoglio è salvato in modo sicuro nel tuo account e lo ritrovi
      su qualsiasi dispositivo dopo il login. Non servono le unità: bastano
      importo e data d'acquisto.
    </div>

    <div class="search-hero">
      <div class="sh-top">
        <h3>Aggiungi una posizione</h3>
        <span style="display:flex;gap:8px">
          <button type="button" id="pf-import" title="Importa i titoli da un estratto conto o documento bancario">⬆ Importa</button>
          <button type="button" id="pf-refresh" title="Aggiorna ai prezzi più recenti disponibili">↻ Aggiorna prezzi</button>
        </span>
      </div>
      <div class="search-box">
        <span class="s-icon">🔍</span>
        <input id="pf-search" type="text" autocomplete="off" placeholder="Cerca titolo, ETF o fondo — es. Apple, VWCE, BlackRock…">
        <div id="pf-dropdown" class="search-dropdown" style="display:none"></div>
      </div>
      <div id="pf-selected"></div>
    </div>

    <div class="private-form" style="grid-template-columns:1fr; margin-bottom:16px">
      <div>
        <label for="pf-value">Valore totale del portafoglio (€) — opzionale, per la concentrazione</label>
        <input id="pf-value" type="number" min="0" step="any" placeholder="es. 50000">
      </div>
    </div>

    <div id="pf-advisor"></div>
    <div id="pf-perf"></div>
    <div class="holdings-list" id="pf-holdings"></div>
    <div id="private-results"></div>
    <div id="pf-news"></div>
  `;

  el.querySelector("#pf-import").addEventListener("click", () => openImportModal());

  const valueInput = el.querySelector("#pf-value");
  const searchInput = el.querySelector("#pf-search");
  const dropdown = el.querySelector("#pf-dropdown");
  const selectedBox = el.querySelector("#pf-selected");
  const perfBox = el.querySelector("#pf-perf");
  const holdingsBox = el.querySelector("#pf-holdings");
  const refreshBtn = el.querySelector("#pf-refresh");
  const resultsEl = el.querySelector("#private-results");
  const headEl = el.querySelector(".private-head");

  let pendingPick = null; // the ticker chosen but not yet confirmed with a date

  // ---- search dropdown ----
  searchInput.addEventListener("input", () => {
    const matches = searchTickers(searchInput.value);
    if (!matches.length) {
      dropdown.style.display = searchInput.value.trim().length >= 2 ? "block" : "none";
      if (searchInput.value.trim().length >= 2) {
        dropdown.innerHTML = `<div class="search-empty">Nessun titolo trovato nella lista. (La ricerca copre i titoli/ETF più comuni.)</div>`;
      }
      return;
    }
    dropdown.style.display = "block";
    dropdown.innerHTML = matches.map(m => `
      <div class="search-result" data-symbol="${m.symbol}">
        <span class="sr-name">${m.name}</span>
        <span class="sr-meta">${m.symbol} · ${m.exchange}</span>
      </div>
    `).join("");
  });

  document.addEventListener("click", (e) => {
    if (!el.contains(e.target)) dropdown.style.display = "none";
  });

  dropdown.addEventListener("click", (e) => {
    const row = e.target.closest(".search-result");
    if (!row) return;
    const symbol = row.dataset.symbol;
    const meta = tickerList.find(t => t.symbol === symbol);
    pendingPick = meta;
    dropdown.style.display = "none";
    searchInput.value = "";
    renderPending();
  });

  // ---- confirm step: chosen ticker + amount + date ----
  function renderPending() {
    if (!pendingPick) { selectedBox.innerHTML = ""; return; }
    selectedBox.innerHTML = `
      <div class="selected-chip">
        <span><span class="sc-name">${pendingPick.name}</span><span class="sc-meta">${pendingPick.symbol} · ${pendingPick.exchange}</span></span>
        <button type="button" id="pf-cancel-pick">annulla</button>
      </div>
      <div class="add-holding-form">
        <div>
          <label for="pf-amount">Importo investito (€)</label>
          <input id="pf-amount" type="number" min="0" step="any" placeholder="es. 1500">
        </div>
        <div>
          <label for="pf-date">Data di acquisto</label>
          <input id="pf-date" type="date" max="${todayIso}">
        </div>
        <button type="button" id="add-holding-btn" disabled>Aggiungi</button>
      </div>
      <div id="pf-add-note" class="private-note" style="margin:0"></div>
    `;
    const amountInput = selectedBox.querySelector("#pf-amount");
    const dateInput = selectedBox.querySelector("#pf-date");
    const addBtn = selectedBox.querySelector("#add-holding-btn");
    const addNote = selectedBox.querySelector("#pf-add-note");

    function validate() {
      const amt = parseFloat(amountInput.value);
      const date = dateInput.value;
      addBtn.disabled = !(amt > 0 && date);
    }
    amountInput.addEventListener("input", validate);
    dateInput.addEventListener("input", validate);

    selectedBox.querySelector("#pf-cancel-pick").addEventListener("click", () => {
      pendingPick = null; renderPending();
    });

    addBtn.addEventListener("click", async () => {
      const amt = parseFloat(amountInput.value);
      const date = dateInput.value;
      addNote.textContent = "Verifico lo storico prezzi…";
      const hist = await getTickerHistory(pendingPick.symbol);
      if (!hist.length) {
        addNote.textContent = "Storico prezzi non disponibile per questo titolo — riprova più tardi.";
        return;
      }
      const earliest = hist[0][0];
      if (date < earliest) {
        addNote.textContent = `Lo storico di ${pendingPick.symbol} parte dal ${earliest} — scegli una data successiva.`;
        return;
      }
      portfolioState.holdings.push({
        symbol: pendingPick.symbol, name: pendingPick.name, exchange: pendingPick.exchange,
        investedAmount: amt, purchaseDate: date,
      });
      pendingPick = null;
      renderPending();
      persistPortfolio();
      await renderHoldings();
      if (latestCard) renderAnalysisTab(latestCard);  // per-asset regression + chart follow the portfolio
    });

    validate();
  }

  const eur = (n) => "€" + Math.round(n).toLocaleString("it-IT");

  // ---- holdings list + performance ----
  async function renderHoldings() {
    document.getElementById("private-badge")?.remove();

    if (!portfolioState.holdings.length) {
      perfBox.innerHTML = "";
      holdingsBox.innerHTML = "";
      resultsEl.innerHTML = `<div id="private-placeholder">Cerca e aggiungi almeno una posizione qui sopra per vedere la performance del tuo portafoglio.</div>`;
      renderNewsCard(el.querySelector("#pf-news"));  // still show macro-relevant news
      return;
    }

    // resolve each holding's purchase & current price from its history
    const enriched = [];
    for (const h of portfolioState.holdings) {
      const hist = await getTickerHistory(h.symbol);
      const purchasePrice = navOnOrBefore(hist, h.purchaseDate);
      const currentPrice = hist.length ? hist[hist.length - 1][1] : null;
      const priced = purchasePrice > 0 && currentPrice > 0;
      const marketValue = priced ? h.investedAmount * currentPrice / purchasePrice : null;
      enriched.push({ ...h, purchasePrice, currentPrice, priced, marketValue });
    }

    const portfolioValue = parseFloat(valueInput.value);
    const priced = enriched.filter(h => h.priced);
    const totalInvested = priced.reduce((s, h) => s + h.investedAmount, 0);
    const totalValue = priced.reduce((s, h) => s + h.marketValue, 0);
    const totalPnl = totalInvested ? (totalValue - totalInvested) / totalInvested * 100 : null;

    // ── prominent portfolio-performance summary ──
    if (priced.length) {
      const cls = totalPnl == null ? "" : (totalPnl >= 0 ? "pos" : "neg");
      const pnlStr = totalPnl == null ? "n/d" : `${totalPnl >= 0 ? "+" : ""}${totalPnl.toFixed(1)}%`;
      const signals = computePortfolioSignals(enriched, portfolioValue) || [];
      const score = signals.reduce((sum, s) => sum + s.points, 0);
      perfBox.innerHTML = `
        <div class="perf-summary ${cls}">
          <div class="perf-main">
            <div class="perf-label">Performance del portafoglio</div>
            <div class="perf-value ${cls}">${pnlStr}</div>
            <div class="perf-sub">${eur(totalInvested)} investiti → <strong>${eur(totalValue)}</strong> oggi${enriched.length > priced.length ? ` · ${enriched.length - priced.length} posizione/i senza prezzo` : ""}</div>
          </div>
          <span class="badge ${badgeClass(score)}">${pillarLabel(score)}</span>
        </div>`;
    } else {
      perfBox.innerHTML = "";
    }

    // ── holding cards: chosen securities + their performance ──
    holdingsBox.innerHTML = enriched.map((h, i) => {
      const pnl = h.priced ? (h.currentPrice / h.purchasePrice - 1) * 100 : null;
      const pnlStr = pnl == null ? "n/d" : `${pnl >= 0 ? "+" : ""}${pnl.toFixed(0)}%`;
      const pnlClass = pnl == null ? "na" : (pnl >= 0 ? "pos" : "neg");
      const conc = (h.priced && portfolioValue > 0)
        ? `<div class="hc-conc">${(h.marketValue / portfolioValue * 100).toFixed(0)}% del portafoglio</div>` : "";
      const dateFmt = h.purchaseDate.split("-").reverse().join("/");
      return `<div class="holding-card">
        <div class="hc-left">
          <div class="hc-name">${h.name}</div>
          <div class="hc-meta">${h.symbol} · ${eur(h.investedAmount)} investiti · dal ${dateFmt}</div>
          ${conc}
        </div>
        <div class="hc-right">
          <span class="hc-pnl ${pnlClass}">${pnlStr}</span>
          <button type="button" class="hr-remove" data-idx="${i}" title="Rimuovi">×</button>
        </div>
      </div>`;
    }).join("");

    holdingsBox.querySelectorAll(".hr-remove").forEach(btn => {
      btn.addEventListener("click", () => {
        portfolioState.holdings.splice(parseInt(btn.dataset.idx), 1);
        persistPortfolio();
        renderHoldings();
        if (latestCard) renderAnalysisTab(latestCard);  // keep the Analysis tab in sync
      });
    });

    // The performance summary + per-holding cards above already convey
    // P&L and concentration cleanly, so no duplicated signal list here.
    resultsEl.innerHTML = priced.length ? "" :
      `<div id="private-placeholder">Nessuna posizione con prezzo valido — controlla le date d'acquisto.</div>`;

    renderNewsCard(el.querySelector("#pf-news"));  // re-rank news for the new portfolio
  }

  // ---- refresh: re-fetch the latest published price history for the
  // selected securities (static files are as fresh as the last data
  // build; this clears the in-memory cache and re-reads them). ----
  refreshBtn.addEventListener("click", async () => {
    refreshBtn.disabled = true;
    const orig = refreshBtn.textContent;
    refreshBtn.textContent = "↻ Aggiorno…";
    for (const k of Object.keys(tickerHistoryCache)) delete tickerHistoryCache[k];
    analysisMacroHistory = null;
    await renderHoldings();
    if (latestCard) renderAnalysisTab(latestCard);
    refreshBtn.textContent = "✓ Aggiornato";
    setTimeout(() => { refreshBtn.textContent = orig; refreshBtn.disabled = false; }, 1600);
  });

  valueInput.addEventListener("input", () => {
    portfolioState.portfolioValue = valueInput.value;
    persistPortfolio();
    renderHoldings();
  });

  // portfolioState is already loaded (cloud or localStorage) by
  // loadPortfolioState() before this section is built — just reflect it.
  valueInput.value = portfolioState.portfolioValue || "";
  renderHoldings();

  return el;
}

function timeAgo(date) {
  const s = Math.round((Date.now() - date.getTime()) / 1000);
  if (s < 10) return "aggiornato ora";
  if (s < 60) return `aggiornato ${s}s fa`;
  const m = Math.round(s / 60);
  if (m < 60) return `aggiornato ${m} min fa`;
  const h = Math.round(m / 60);
  return `aggiornato ${h} ${h === 1 ? "ora" : "ore"} fa`;
}

// Renders one scorecard pillar (title + score badge + signal list) as a
// card element. Reused by the Analysis tab for the market-context and
// outlook pillars.
function pillarCard(p) {
  const el = document.createElement("div");
  el.className = "pillar";
  const bClass = badgeClass(p.score);
  el.innerHTML = `
    <div class="pillar-head">
      <h2>${p.title}</h2>
      <span class="badge ${bClass}">${p.label} (${p.score >= 0 ? "+" : ""}${p.score.toFixed(1)})</span>
    </div>
    <div class="signals"></div>
  `;
  const signalsEl = el.querySelector(".signals");
  for (const s of p.signals) {
    const row = document.createElement("div");
    row.className = "signal";
    row.innerHTML = `
      <div class="mark ${s.bias}">${markSymbol[s.bias]}</div>
      <div class="signal-body">
        <span class="name">${s.name}</span><span class="reading">${s.reading}</span>
        <div class="why">${s.why}</div>
      </div>
    `;
    signalsEl.appendChild(row);
  }
  return el;
}

// Login / signup screen, shown in the "Il tuo portafoglio" tab when
// login is configured and no one is authenticated. Mandatory login: the
// personal portfolio (and the analysis that depends on it) needs an
// account.
function renderLoginScreen() {
  document.body.classList.add("no-sidebar");  // full-page login, no app chrome
  switchView("dashboard");
  const content = document.getElementById("content");
  content.innerHTML = "";
  const gatedNote = `<div class="chart-card"><div class="private-note">Accedi per costruire il portafoglio e vedere qui l'analisi.</div></div>`;
  document.getElementById("analysis-content").innerHTML = gatedNote;
  document.getElementById("chat-content").innerHTML = gatedNote;
  document.getElementById("profile-content").innerHTML = gatedNote;

  let mode = "signin"; // or "signup"
  const card = document.createElement("div");
  card.className = "auth-card";

  function paint() {
    card.innerHTML = `
      <h2>${mode === "signin" ? "Accedi" : "Crea un account"}</h2>
      <div class="auth-sub">Il tuo portafoglio viene salvato nel tuo account e lo ritrovi su ogni dispositivo. ${mode === "signin" ? "Non hai un account?" : "Hai già un account?"} <span class="auth-toggle" style="display:inline"><a id="auth-switch">${mode === "signin" ? "Registrati" : "Accedi"}</a></span></div>
      <div class="auth-field">
        <label for="auth-email">Email</label>
        <input id="auth-email" type="email" autocomplete="email" placeholder="tu@esempio.com">
      </div>
      <div class="auth-field">
        <label for="auth-password">Password</label>
        <input id="auth-password" type="password" autocomplete="${mode === "signin" ? "current-password" : "new-password"}" placeholder="almeno 6 caratteri">
      </div>
      <button id="auth-submit" type="button">${mode === "signin" ? "Accedi" : "Registrati"}</button>
      <div class="auth-msg" id="auth-msg"></div>
    `;
    const email = card.querySelector("#auth-email");
    const pw = card.querySelector("#auth-password");
    const submit = card.querySelector("#auth-submit");
    const msg = card.querySelector("#auth-msg");

    card.querySelector("#auth-switch").addEventListener("click", () => {
      mode = mode === "signin" ? "signup" : "signin"; paint();
    });

    submit.addEventListener("click", async () => {
      const e = email.value.trim(), p = pw.value;
      if (!e || p.length < 6) { msg.className = "auth-msg err"; msg.textContent = "Inserisci email e una password di almeno 6 caratteri."; return; }
      submit.disabled = true; msg.className = "auth-msg"; msg.textContent = "Attendi…";
      const res = mode === "signin" ? await authSignIn(e, p) : await authSignUp(e, p);
      if (res.error) {
        submit.disabled = false; msg.className = "auth-msg err"; msg.textContent = res.error.message;
        return;
      }
      if (mode === "signup" && !res.session) {
        // email confirmation is on — user created but no session yet
        msg.className = "auth-msg ok";
        msg.textContent = "Ti abbiamo inviato un'email di conferma. Aprila, conferma l'account, poi torna qui e accedi.";
        submit.disabled = false;
        return;
      }
      // success (session created) → authOnChange will re-render the app
    });

    pw.addEventListener("keydown", (ev) => { if (ev.key === "Enter") submit.click(); });
  }
  paint();
  content.appendChild(card);
}

// Investor-profiling questionnaire (5 questions, see profile.js). Two
// modes:
//   "onboarding" — shown right after login when no profile is saved yet;
//     mandatory (no cancel), replaces the whole app like the login screen.
//   "edit" — embedded in the "Profilo" sidebar section; pre-filled with
//     the saved answers, has a cancel button.
// targetEl (optional): render into this container instead of replacing
// the Home content — used by the Profilo section.
function renderProfileScreen(mode, onDone, targetEl) {
  const content = targetEl || document.getElementById("content");
  if (!targetEl) content.innerHTML = "";
  if (mode === "onboarding") {
    document.body.classList.add("no-sidebar");  // like the login screen: no app chrome yet
    switchView("dashboard");
    const gatedNote = `<div class="chart-card"><div class="private-note">Rispondi prima alle 5 domande del profilo — servono a mostrarti le notizie e i contenuti più adatti a te.</div></div>`;
    document.getElementById("analysis-content").innerHTML = gatedNote;
    document.getElementById("chat-content").innerHTML = gatedNote;
    document.getElementById("profile-content").innerHTML = gatedNote;
  }

  const answers = Object.assign({}, (userProfile && userProfile.answers) || {});
  const card = document.createElement("div");
  card.className = "profile-card";

  // Built ONCE. Radio changes only toggle classes + the submit state —
  // we deliberately do NOT rebuild innerHTML on each answer, because
  // recreating the radios mid-change-event corrupts the selection (a
  // click on one question would clear another). See the change handler.
  card.innerHTML = `
    <h2>Il tuo profilo da investitore</h2>
    <div class="auth-sub">${mode === "onboarding"
      ? "5 domande rapide, come un questionario di adeguatezza: ci servono per mostrarti le notizie più pertinenti al tuo profilo. Non generano consigli di investimento — solo contesto su misura."
      : "Puoi aggiornare le tue risposte in qualsiasi momento."}</div>
    ${PROFILE_QUESTIONS.map((q, i) => `
      <div class="profile-q" data-qid="${q.id}">
        <div><span class="pq-num">${i + 1}</span><span class="pq-text">${q.text}</span></div>
        <div class="pq-hint">${q.hint}</div>
        ${q.options.map(o => `
          <label class="profile-opt ${answers[q.id] === o.key ? "checked" : ""}">
            <input type="radio" name="${q.id}" value="${o.key}" ${answers[q.id] === o.key ? "checked" : ""}>
            <span><strong>${o.key})</strong> ${o.text}</span>
          </label>
        `).join("")}
      </div>
    `).join("")}
    <button id="profile-submit" ${PROFILE_QUESTIONS.every(q => answers[q.id]) ? "" : "disabled"}>Salva profilo</button>
    ${mode === "edit" ? `<button type="button" class="profile-cancel" id="profile-cancel">Annulla</button>` : ""}
  `;

  const submitBtn = card.querySelector("#profile-submit");

  card.querySelectorAll('input[type="radio"]').forEach(r => {
    r.addEventListener("change", () => {
      answers[r.name] = r.value;
      // repaint ONLY this question's option highlight, in place
      card.querySelectorAll(`.profile-q[data-qid="${r.name}"] .profile-opt`).forEach(lab => {
        lab.classList.toggle("checked", lab.querySelector("input").value === r.value);
      });
      submitBtn.disabled = !PROFILE_QUESTIONS.every(q => answers[q.id]);
    });
  });

  const cancelBtn = card.querySelector("#profile-cancel");
  if (cancelBtn) cancelBtn.addEventListener("click", () => onDone(false));

  submitBtn.addEventListener("click", async () => {
    submitBtn.disabled = true; submitBtn.textContent = "Salvo…";
    // Try the cloud; always keep a local cache so the profile survives
    // even if the profiles table isn't created yet (login won't loop).
    await cloudSaveProfile(answers);
    if (currentUser) saveLocalProfile(currentUser.id, answers);
    userProfile = computeRiskProfile(answers);
    onDone(true);
  });

  content.appendChild(card);
}

// The "Il tuo portafoglio" tab is the private portfolio itself (login-
// gated). Everything analytical (chart, per-asset regressions, market
// context) lives in the "Analisi & Previsione" tab, driven by this same
// portfolio.
// ═══ Import: read a bank statement / portfolio document and turn its
// rows into holdings. Transparent pipeline, all in the browser:
//   1. get text (PDF via pdf.js loaded on demand, CSV/TXT, or pasted)
//   2. per line: match a security from OUR universe (symbol or name
//      tokens) + extract the biggest European-format number as the
//      invested-amount candidate
//   3. review screen: user confirms/edits amounts and date, then adds.
// Honest limits, stated in the modal: scanned/image PDFs aren't readable
// (no OCR), and only securities in the platform's universe can be
// recognized (we can only analyze what we have price data for).

const _IMPORT_STOPWORDS = new Set(["the", "inc", "corp", "corporation", "company", "co", "plc",
  "ag", "se", "sa", "spa", "nv", "holdings", "holding", "group", "ltd", "limited", "trust",
  "etf", "etc", "ucits", "usd", "eur", "acc", "dist", "shares", "fund", "index", "core",
  "physical", "aktiengesellschaft", "incorporated"]);

function _significantTokens(name) {
  return name.toLowerCase().replace(/[^a-zà-ù0-9 ]/g, " ").split(/\s+/)
    .filter(t => t.length >= 3 && !_IMPORT_STOPWORDS.has(t));
}

// European-format number: "4.503,00" → 4503, "1,234.56" → 1234.56, "450,3" → 450.3
function _parseEuroNumber(s) {
  s = s.replace(/\s/g, "");
  const lastC = s.lastIndexOf(","), lastD = s.lastIndexOf(".");
  if (lastC >= 0 && lastD >= 0) {
    s = lastC > lastD ? s.replace(/\./g, "").replace(",", ".") : s.replace(/,/g, "");
  } else if (lastC >= 0) {
    const dec = s.length - lastC - 1;
    s = dec <= 2 ? s.slice(0, lastC).replace(/,/g, "") + "." + s.slice(lastC + 1) : s.replace(/,/g, "");
  } else if (lastD >= 0) {
    const dec = s.length - lastD - 1;
    if (dec > 2 || (s.match(/\./g) || []).length > 1) s = s.replace(/\./g, "");
  }
  const v = parseFloat(s);
  return isFinite(v) ? v : NaN;
}

// Biggest plausible money amount in the line (bank rows: the market
// value is normally the largest figure — quantities and unit prices are
// smaller). Dates, years and ISINs are stripped first so they can't win.
function _extractAmount(line) {
  const cleaned = line
    .replace(/\b[A-Z]{2}[A-Z0-9]{9}[0-9]\b/g, " ")            // ISINs
    .replace(/\b\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4}\b/g, " ") // dates
    .replace(/\b(19|20)\d{2}\b/g, " ");                       // bare years
  // NOTE: no spaces inside a number token — allowing them merges adjacent
  // table columns ("qta 10  421,00" would become 10421). Italian bank
  // docs use "1.234,56", which this handles.
  const tokens = cleaned.match(/\d[\d.,]*\d|\d/g) || [];
  let best = null;
  for (const t of tokens) {
    const v = _parseEuroNumber(t.trim());
    if (isFinite(v) && v >= 1 && v < 1e9 && (best === null || v > best)) best = v;
  }
  return best;
}

// Lines that are bank-document furniture (headers, totals, account
// info), never security rows. Skipped BEFORE matching — otherwise the
// bank's own name in the header would be imported as a holding (a real
// bug found in testing: "INTESA SANPAOLO - DOSSIER TITOLI N. 445566"
// became ISP.MI for €445,566, the dossier number).
const _IMPORT_SKIP_LINE = /\b(dossier|estratt\w*|situazion\w*|rendicont\w*|patrimoni\w*|intestat\w*|total\w*|sald\w*|aggiornat\w*|deposit\w*|iban|pagin\w*|pag\.|c\/c|conto\b)/i;

// Match one document line to a security in the universe. Every entry is
// scored — symbol hit (word boundary) is strongest, then how MANY of the
// entry's significant name tokens appear — and the best score wins.
// First-two-tokens-present remains the minimum bar. Scoring matters for
// families of similar names: "iShares Core MSCI World" and "iShares Core
// MSCI EM IMI" share their first two tokens; the extra "world" hit is
// what picks the right one (a real bug found in testing).
function _matchUniverseLine(line) {
  const low = " " + line.toLowerCase() + " ";
  const tokIn = (tok) => tok.length >= 5 ? low.includes(tok) : new RegExp("\\b" + tok + "\\b").test(low);
  let best = null, bestScore = 0;
  for (const t of tickerList) {
    let score = 0;
    const symBase = t.symbol.split(".")[0].toLowerCase();
    if (symBase.length >= 3 && new RegExp("\\b" + symBase.replace(/[-]/g, "[-\\s]?") + "\\b", "i").test(line)) score += 10;
    const toks = _significantTokens(t.name).slice(0, 4);
    const hits = toks.filter(tokIn).length;
    const firstTwoOk = toks.slice(0, 2).every(tokIn);
    if (toks.length && firstTwoOk) score += hits;
    if (score > bestScore) { bestScore = score; best = t; }
  }
  return bestScore > 0 ? best : null;
}

// text → {matches: [{symbol,name,exchange,amount,line}], unmatched: [line], isins: [..]}
function parseImportText(text) {
  const seen = new Set(), matches = [], unmatched = [], isins = new Set();
  for (let raw of text.split(/\r?\n/)) {
    const line = raw.replace(/[;\t]+/g, "  ").trim();
    if (line.length < 3) continue;
    if (_IMPORT_SKIP_LINE.test(line)) continue;  // headers/totals/account furniture
    (line.match(/\b[A-Z]{2}[A-Z0-9]{9}[0-9]\b/g) || []).forEach(i => isins.add(i));
    const hit = _matchUniverseLine(line);
    if (!hit) {
      // only keep plausible security rows in the unmatched report (has
      // letters AND a number) — skips residual noise ({3,} so short names
      // like "BTP" still show up as unrecognized instead of vanishing)
      if (/[a-zA-Z]{3,}/.test(line) && /\d/.test(line)) unmatched.push(line.slice(0, 90));
      continue;
    }
    const key = hit.symbol.split(".")[0].split("-")[0];
    if (seen.has(key)) continue;
    seen.add(key);
    matches.push({ symbol: hit.symbol, name: hit.name, exchange: hit.exchange,
                   amount: _extractAmount(line), line: line.slice(0, 110) });
  }
  return { matches, unmatched: unmatched.slice(0, 8), isins: [...isins] };
}

// pdf.js loaded from CDN only when the user actually imports a PDF.
let _pdfjsLoading = null;
function _loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve();
  if (!_pdfjsLoading) {
    _pdfjsLoading = new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js";
      s.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
        resolve();
      };
      s.onerror = () => reject(new Error("Impossibile caricare il lettore PDF (rete?)"));
      document.head.appendChild(s);
    });
  }
  return _pdfjsLoading;
}

// Extract text from a PDF, reconstructing LINES by grouping glyphs that
// share the same vertical position on the page (bank tables need this —
// naive extraction scrambles columns and rows).
async function _pdfToText(arrayBuffer) {
  await _loadPdfJs();
  const doc = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];
  for (let p = 1; p <= doc.numPages; p++) {
    const tc = await (await doc.getPage(p)).getTextContent();
    const rows = new Map();  // rounded y → [{x, str}]
    for (const it of tc.items) {
      if (!it.str || !it.str.trim()) continue;
      const y = Math.round(it.transform[5] / 3) * 3;  // 3pt tolerance
      if (!rows.has(y)) rows.set(y, []);
      rows.get(y).push({ x: it.transform[4], str: it.str });
    }
    const lines = [...rows.entries()].sort((a, b) => b[0] - a[0])
      .map(([, items]) => items.sort((a, b) => a.x - b.x).map(i => i.str).join(" "));
    pages.push(lines.join("\n"));
  }
  return pages.join("\n");
}

let appCard = null;  // last-loaded market-data card, so we can re-render on login/logout

// Decides what the app shows based on auth: the login screen when login
// is configured and nobody's signed in, else the portfolio (after
// loading it from the cloud / localStorage).
async function renderGated() {
  if (!appCard) return;
  if (authConfigured() && !currentUser) {
    _profileScreenActive = false;
    _renderedForUid = null;
    renderLoginScreen();
    return;
  }
  // Supabase re-fires auth events in the background (token refresh, tab
  // visibility); each calls renderGated. Two guards keep those spurious
  // re-fires from wiping in-progress user input (onboarding answers, the
  // embedded Profilo form, half-typed chat): skip while onboarding is
  // open, and skip when the app is already rendered for this same user.
  if (_profileScreenActive) return;
  const uid = currentUser ? currentUser.id : "anon";
  if (uid === _renderedForUid) return;

  if (authConfigured() && currentUser && userProfile === null) {
    // Cloud is the source of truth when reachable; if the profiles table
    // is missing / offline, fall back to a per-user localStorage cache so
    // login is NEVER blocked by a missing table (see auth.js).
    const res = await cloudLoadProfile();
    const answers = res.ok ? res.answers : loadLocalProfile(currentUser.id);
    if (!answers) {
      _profileScreenActive = true;
      renderProfileScreen("onboarding", () => { _profileScreenActive = false; renderGated(); });
      return;
    }
    userProfile = computeRiskProfile(answers);
  }
  await loadPortfolioState();
  _renderedForUid = uid;
  render(appCard);
}

// Parses the factor_regression pillar's existing signal text back into a
// clean table — no backend schema change needed, the "reading"/"why"
// strings already contain everything (see engine/scoring.py
// pillar_factor_regression, which writes them in this exact format).
function parseFactorSignal(s) {
  const readingMatch = s.reading.match(/coef=([+-][\d.]+), p=([\d.]+)/);
  const vifMatch = s.why.match(/VIF=([\d.]+)/);
  return {
    name: s.name,
    coef: readingMatch ? parseFloat(readingMatch[1]) : null,
    pvalue: readingMatch ? parseFloat(readingMatch[2]) : null,
    vif: vifMatch ? parseFloat(vifMatch[1]) : null,
    significant: s.bias !== "neutral",
    bias: s.bias,
  };
}

// Builds the coef/p-value/VIF table body from a factors object of the
// shape {key: {coef, pvalue, vif}} — used both by the static
// (scorecard-derived) table and the live per-asset browser regressions.
function regressionTableRows(factors) {
  return Object.entries(factors).map(([key, f]) => {
    const label = (typeof OLS_FACTOR_LABELS !== "undefined" && OLS_FACTOR_LABELS[key]) || key;
    const significant = f.pvalue != null && f.pvalue < 0.05;
    const sigBadge = significant
      ? `<span class="reg-badge yes">sì (p&lt;0.05)</span>`
      : `<span class="reg-badge no">no</span>`;
    const vifBadge = f.vif == null ? "—" :
      f.vif >= 10 ? `<span class="reg-badge vif-high">${f.vif.toFixed(1)} alto</span>` :
      f.vif.toFixed(1);
    const rowClass = significant ? (f.coef > 0 ? "sig-pos" : "sig-neg") : "";
    return `<tr class="${rowClass}">
      <td class="factor-name">${label}</td>
      <td class="num">${f.coef != null ? f.coef.toFixed(3) : "—"}</td>
      <td class="num">${f.pvalue != null ? f.pvalue.toFixed(3) : "—"}</td>
      <td>${sigBadge}</td>
      <td class="num">${vifBadge}</td>
    </tr>`;
  }).join("");
}

function regressionTableCard(title, narrative, subtitle, factors) {
  const card = document.createElement("div");
  card.className = "chart-card";
  // The plain-language narrative stays visible; the dense coefficient
  // table is tucked into a collapsible <details> so the default view
  // stays light for a non-expert (streamlining), while the full numbers
  // remain one click away for anyone who wants them.
  card.innerHTML = `
    <h2>${title}</h2>
    ${narrative ? `<div class="private-note" style="font-weight:600;color:var(--ink)">${narrative}</div>` : ""}
    ${subtitle ? `<div class="private-note">${subtitle}</div>` : ""}
    <details class="reg-details">
      <summary>Mostra i coefficienti (dettaglio tecnico)</summary>
      <div class="reg-table-wrap">
        <table class="reg-table">
          <thead><tr>
            <th>Fattore</th><th>Coefficiente</th><th>p-value</th><th>Significativo</th><th>VIF</th>
          </tr></thead>
          <tbody>${regressionTableRows(factors)}</tbody>
        </table>
      </div>
      <div class="private-note" style="margin-top:10px">
        Sensibilità storica del rendimento giornaliero dell'asset a ciascun fattore. Verde/rosso =
        relazione statisticamente significativa (p&lt;0.05) positiva/negativa. VIF alto (&gt;10) = il
        coefficiente è poco affidabile per collinearità con un altro fattore. Non è una previsione.
      </div>
    </details>
  `;
  return card;
}

// ── Plain-language interpretation of the whole picture ──
// Reads the market-context pillars (VIX level/trend, US 10Y) and the
// aggregated significant factors across the portfolio's regressions,
// and turns them into a few general bullet points for a user who has no
// time to read tables. GENERAL (across variables), not one-per-factor.
function findSignalReading(card, pillarKey, signalName) {
  const p = card.pillars.find(x => x.key === pillarKey);
  if (!p) return null;
  const s = p.signals.find(x => x.name.toUpperCase() === signalName.toUpperCase());
  return s ? s.reading : null;
}

function buildInterpretationBullets(card, regressionResults) {
  const bullets = [];

  // 1) market volatility / mood (VIX level + recent trend)
  const vixLevel = parseFloat(findSignalReading(card, "macro", "VIX") || "");
  const vixTrend = findSignalReading(card, "outlook", "VIX") || "";
  if (!isNaN(vixLevel)) {
    const mood = vixLevel <= 16 ? "basso: clima di mercato calmo, propenso al rischio"
               : vixLevel <= 24 ? "nella media" : "alto: clima di mercato teso";
    const dir = /rising/.test(vixTrend) ? ", ed è salito nell'ultimo mese"
              : /falling/.test(vixTrend) ? ", ed è sceso nell'ultimo mese" : "";
    bullets.push({ icon: "🌡️", text: `<strong>Volatilità di mercato:</strong> l'indice della paura (VIX) è ${mood}${dir}.` });
  }

  // 2) interest rates (US 10Y level + trend)
  const us10y = parseFloat((findSignalReading(card, "macro", "US 10Y") || "").replace("%", ""));
  const rateTrend = findSignalReading(card, "outlook", "US 10Y") || "";
  if (!isNaN(us10y)) {
    const dir = /rising/.test(rateTrend) ? "in leggera salita"
              : /falling/.test(rateTrend) ? "in leggero calo" : "stabile";
    const effect = /rising/.test(rateTrend)
        ? "tassi che salgono pesano di più sui titoli growth/tech e sui fondi a lunga scadenza"
        : /falling/.test(rateTrend)
        ? "tassi che scendono tendono ad alleggerire la pressione sui titoli growth"
        : "i tassi non stanno spingendo in una direzione netta";
    bullets.push({ icon: "🏦", text: `<strong>Tassi d'interesse:</strong> il rendimento USA a 10 anni è al ${us10y.toFixed(1)}% ed è ${dir} — ${effect}.` });
  }

  // 3) what actually moves the user's portfolio (aggregate reliable factors)
  const pos = new Set(), neg = new Set();
  for (const r of regressionResults) {
    if (!r.result || r.result.error) continue;
    for (const [k, v] of Object.entries(r.result.factors)) {
      const reliable = v.pvalue < 0.05 && (v.vif == null || v.vif < 10);
      if (reliable && v.coef > 0) pos.add(OLS_FACTOR_LABELS[k] || k);
      if (reliable && v.coef < 0) neg.add(OLS_FACTOR_LABELS[k] || k);
    }
  }
  if (pos.size || neg.size) {
    const parts = [];
    if (pos.size) parts.push(`si muove storicamente insieme a <strong>${[...pos].join(", ")}</strong>`);
    if (neg.size) parts.push(`tende a soffrire quando salgono <strong>${[...neg].join(", ")}</strong>`);
    bullets.push({ icon: "📊", text: `<strong>Cosa muove i tuoi titoli:</strong> il portafoglio ${parts.join("; ")}.` });
  } else if (regressionResults.length) {
    bullets.push({ icon: "📊", text: `<strong>Cosa muove i tuoi titoli:</strong> si muovono soprattutto per ragioni proprie, poco legate ai fattori macro tracciati qui.` });
  }

  return bullets;
}

function buildInterpretationCard(card, regressionResults) {
  const bullets = buildInterpretationBullets(card, regressionResults);
  if (!bullets.length) return null;
  const el = document.createElement("div");
  el.className = "interp-card";
  el.innerHTML = `
    <h2>In parole semplici — cosa dicono questi dati</h2>
    <div class="ic-sub">Una sintesi del contesto di mercato di oggi e di come si lega al tuo portafoglio.</div>
    <ul class="interp-bullets">
      ${bullets.map(b => `<li><span class="ib-icon">${b.icon}</span><span class="ib-text">${b.text}</span></li>`).join("")}
    </ul>
    <div class="interp-close">Sono una fotografia del presente e relazioni storiche, non previsioni. Servono a darti contesto — la decisione resta tua.</div>
  `;
  return el;
}

// Card for the Fama-French-Carhart portfolio decomposition (from ff.js).
function buildCarhartCard(res) {
  const el = document.createElement("div");
  el.className = "chart-card";
  if (res.error) {
    el.innerHTML = `<h2>Analisi fattoriale accademica (Fama-French-Carhart)</h2>
      <div class="private-note">${res.error}</div>`;
    return el;
  }
  const narrative = carhartNarrative(res);
  const alphaSig = res.alphaPvalue < 0.05;
  const alphaLine = `Alpha annualizzato ≈ <strong>${res.alphaAnnual >= 0 ? "+" : ""}${res.alphaAnnual.toFixed(1)}%</strong> — l'extra-rendimento non spiegato dai fattori. ${alphaSig ? "Statisticamente significativo, ma raro: valutalo con cautela." : "Non statisticamente significativo (p=" + res.alphaPvalue.toFixed(2) + "): probabilmente è rumore, non vera bravura."}`;

  const rows = res.factors.map(f => {
    const sig = f.pvalue < 0.05;
    const badge = sig ? `<span class="reg-badge yes">sì (p&lt;0.05)</span>` : `<span class="reg-badge no">no</span>`;
    const cls = sig ? (f.beta > 0 ? "sig-pos" : "sig-neg") : "";
    return `<tr class="${cls}">
      <td class="factor-name">${FF_LABELS[f.name] || f.name}</td>
      <td class="num">${f.beta.toFixed(2)}</td>
      <td class="num">${f.pvalue.toFixed(3)}</td>
      <td>${badge}</td>
    </tr>`;
  }).join("");

  el.innerHTML = `
    <h2>Analisi fattoriale accademica (Fama-French-Carhart)</h2>
    <div class="private-note" style="font-weight:600;color:var(--ink)">${narrative}</div>
    <div class="private-note">${alphaLine}</div>
    <div class="private-note">Scomposizione del rendimento del tuo portafoglio nei fattori di rischio accademici (mercato, dimensione, stile, momentum) — fattori "Developed" giornalieri di Ken French. R²=${res.r2.toFixed(2)}, n=${res.n} giorni.</div>
    <details class="reg-details">
      <summary>Mostra i coefficienti (dettaglio tecnico)</summary>
      <div class="reg-table-wrap">
        <table class="reg-table">
          <thead><tr><th>Fattore</th><th>Beta (loading)</th><th>p-value</th><th>Significativo</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="private-note" style="margin-top:10px">
        Il beta è l'inclinazione del portafoglio verso ciascun fattore: per il mercato ~1 = si muove come il mercato;
        SMB positivo = small cap; HML positivo = value (negativo = growth); WML positivo = momentum. Verde/rosso =
        inclinazione statisticamente significativa (p&lt;0.05). Non è una previsione.
      </div>
    </details>
  `;
  return el;
}

// Parse the static portfolio-level regression out of scorecard.json's
// factor_regression pillar (fallback when the user hasn't built a
// browser portfolio).
function staticRegressionFromCard(card) {
  const regPillar = card.pillars.find(p => p.key === "factor_regression");
  if (!regPillar || regPillar.signals.length < 2) return null;
  const factorSignals = regPillar.signals.filter(s => /coef=/.test(s.reading));
  if (!factorSignals.length) return null;
  const factors = {};
  for (const s of factorSignals) {
    const p = parseFactorSignal(s);
    factors[s.name] = { coef: p.coef, pvalue: p.pvalue, vif: p.vif };
  }
  const fit = regPillar.signals.find(s => /R²/.test(s.reading));
  return { factors, fitLine: fit ? fit.reading : "" };
}

// ── Rule-based chat assistant (beta, no LLM) ──────────────────────────
// Answers questions about the user's portfolio and the market by pulling

// per-asset regressions, macro readings). Plain-language, grounded in the

// engine is rule-based today; the session structure is already the one a
// generative backend would use (ordered {role, text} messages), so
// swapping the engine later won't touch the UI or the storage.
let chatSessions = [];    // [{id, title, ts, messages: [{role: "user"|"bot", text}]}]
let chatCurrentId = null;

function _chatStorageKey() { return "chatSessions:" + (currentUser ? currentUser.id : "anon"); }
function loadChatSessions() {
  try { chatSessions = JSON.parse(localStorage.getItem(_chatStorageKey()) || "[]"); }
  catch (e) { chatSessions = []; }
  if (!Array.isArray(chatSessions)) chatSessions = [];
  chatCurrentId = chatSessions.length ? chatSessions[0].id : null;
}
function saveChatSessions() {
  try { localStorage.setItem(_chatStorageKey(), JSON.stringify(chatSessions.slice(0, 30))); } catch (e) { /* quota */ }
}
function newChatSession() {
  const s = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
              title: "Nuova conversazione", ts: Date.now(), messages: [] };
  chatSessions.unshift(s);
  chatCurrentId = s.id;
  saveChatSessions();
  return s;
}
function currentChatSession() { return chatSessions.find(s => s.id === chatCurrentId) || null; }
