name: Refresh ticker prices (daily)

# Refreshes the per-ticker price histories (docs/data/tickers/*.json) that
# every user's in-browser models (momentum, GARCH, VaR, technicals) run
# on. Slower than the news refresh (~100 tickers from Yahoo), so it runs
# once a day. GitHub Pages re-publishes on the resulting commit.

on:
  schedule:
    - cron: "0 5 * * *"    # daily at 05:00 UTC
  workflow_dispatch: {}     # also runnable on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Refresh per-ticker price histories
        run: python build_ticker_universe.py
      - name: Commit & push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tickers
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "chore: auto-refresh ticker prices [skip ci]"
            git push
          fi
